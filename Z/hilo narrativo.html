<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexo v4.5 - La Gala y El Manuscrito</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap');

        :root {
            /* Paleta Original */
            --primary: #00FF88;
            --danger: #FF4400;
            --ui-bg: rgba(5, 8, 18, 0.95);
            --text-main: #e0e0e0;
        }

        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            color: var(--text-main);
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 960px; 
            height: 540px;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.1);
            background: #000;
            overflow: hidden;
            cursor: pointer;
            border-top: 40px solid #000;
            border-bottom: 40px solid #000;
            box-sizing: content-box; 
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #050812; /* Fondo base oscuro */
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            /* Cuadro de diálogo arriba para no tapar la acción */
            justify-content: flex-start; 
            padding-top: 40px;
            padding-bottom: 0;
            box-sizing: border-box;
        }

        #dialog-box {
            background: var(--ui-bg);
            border-top: 2px solid var(--primary);
            border-bottom: 2px solid var(--primary);
            padding: 15px 30px;
            min-height: 90px;
            margin: 0 40px 0 40px; 
            display: none; 
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            backdrop-filter: blur(10px);
            z-index: 200;
        }

        #speaker-name {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            font-size: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #dialog-text {
            font-size: 16px;
            line-height: 1.4;
            color: #fff;
        }

        .next-indicator {
            position: absolute;
            bottom: 8px;
            right: 15px;
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            animation: pulse 2s infinite;
        }

        #title-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 300;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: auto;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 60px;
            color: var(--primary);
            text-shadow: 0 0 30px var(--primary);
            margin: 0;
            letter-spacing: 4px;
        }

        .btn-start {
            margin-top: 40px;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-start:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }

        .film-grain {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 50; opacity: 0.4;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <main id="game-container">
        <canvas id="g" width="960" height="540"></canvas>
        <div class="film-grain"></div>

        <div id="title-screen">
            <h1>ALEXO</h1>
            <p style="color: #888; margin-top: 10px;">NARRATIVA VISUAL V4.5</p>
            <button class="btn-start" id="start-btn">INICIAR SECUENCIA</button>
        </div>

        <div id="ui-layer">
            <div id="dialog-box">
                <div id="speaker-name"></div>
                <div id="dialog-text"></div>
                <div class="next-indicator">▼ AVANZAR</div>
            </div>
        </div>
    </main>

<script>
/**
 * ALEXO V4.5 - VERSIÓN CORREGIDA
 * Historia: La Gala y El Manuscrito.
 * Eliminados: Rescatistas, Puerta de Emergencia, Escaleras del Salón.
 * Restaurado: Ambiente de Gala, Ian, Interacción con Manuscrito.
 */
class CinematicGame {
    constructor() {
        this.canvas = document.getElementById('g');
        this.ctx = this.canvas.getContext('2d');
        this.width = this.canvas.width;
        this.height = this.canvas.height;
        this.floorY = 380; // Altura del suelo

        // Camera System
        this.camera = { x: 200, y: 300, targetX: 200, targetY: 300, shake: 0 };

        // UI References
        this.uiTitle = document.getElementById('title-screen');
        this.uiDialog = document.getElementById('dialog-box');
        this.elSpeaker = document.getElementById('speaker-name');
        this.elText = document.getElementById('dialog-text');

        // Game State
        this.state = 'TITLE'; 
        this.stepIndex = 0;
        this.waitingForInput = false;
        
        // Entities
        this.alexo = { x: 480, y: this.floorY, state: 'IDLE', facing: 1, frame: 0, animState: 'WORK', lookingAt: 'FRONT', visible: true };
        this.ian = { x: 1000, y: this.floorY, visible: false, state: 'IDLE', holdingTray: false, holdingPaper: false, paperAnim: 0 };
        // Rescuers and Kid removed for this version of the story
        
        // Environment
        this.ambience = { fire: 0, smoke: 0, darkness: 0, infrared: false, fog: 0, perceptionGlitch: false };
        this.particles = [];
        this.time = 0;
        
        // Legacy Environment (Water/Birds - Keep for Window scene)
        this.seagulls = [];
        for(let i=0; i<5; i++) {
            this.seagulls.push({ x: Math.random()*960, y: Math.random()*200, vx: 1+Math.random(), vy: Math.random()*0.2 });
        }
        this.waterLines = [];
        for(let i=0; i<20; i++) {
            this.waterLines.push({ x: Math.random()*960, y: Math.random() * 400 + this.floorY });
        }

        // Script Loading
        this.script = this.getDirectorScript();

        // Init Event Listeners
        document.getElementById('start-btn').addEventListener('click', () => this.start());
        document.getElementById('game-container').addEventListener('click', () => this.handleInput());
        
        this.loop = this.loop.bind(this);
    }

    start() {
        this.uiTitle.style.display = 'none';
        this.state = 'PLAYING';
        this.runStep();
        requestAnimationFrame(this.loop);
    }

    getDirectorScript() {
        return [
            // 1. EXPANSIÓN SALÓN (GALA - LIMPIO)
            { type: 'FADE_IN' },
            { type: 'SCENE', bg: 'SALON', cam: { x: 200, y: 300 }, action: () => { 
                this.alexo.x = 450; 
                this.alexo.state = 'IDLE';
                this.ian.visible = false;
                this.alexo.lookingAt = 'RIGHT'; // Alexo mira decoración inicial
            }},
            // Paneo desde Obra de Arte (Izquierda) hacia Plantas/Centro
            { type: 'CAMERA_MOVE', x: 350, y: 310, speed: 0.008 }, 
            { type: 'WAIT', frames: 100 },
            { type: 'CAMERA_MOVE', x: 480, y: 300, speed: 0.01 }, // Centrado en Mesas
            { type: 'DIALOG', text: "El salón de fiestas se prepara para la noche de gala. Alexo trabaja en silencio.", speaker: "" },

            // 2. IAN (ENTRADA GRADUAL)
            // Aparece Ian lejos
            { type: 'ACTION', action: () => { this.ian.visible = true; this.ian.x = 950; } },
            { type: 'CAMERA_MOVE', x: 500, y: 300, speed: 0.01 },
            { type: 'MOVE', actor: 'IAN', x: 650, speed: 1.5 }, // Se acerca despacio
            { type: 'WAIT', frames: 40 }, // Pausa para ver el ambiente
            { type: 'MOVE', actor: 'IAN', x: 550, speed: 1 },
            
            // Ian saca manuscrito
            { type: 'WAIT', frames: 40 },
            { type: 'ACTION', action: () => { this.ian.holdingPaper = true; this.ian.paperAnim = 1; } },
            { type: 'WAIT', frames: 60 }, // Alexo mira el papel

            // 3. INTERACCIÓN
            { type: 'DIALOG', text: "Se ve que tienes una gran habilidad para construir historias creativas.", speaker: "ALEXO" },
            { type: 'WAIT', frames: 100 },

            // 4. TRANSICIÓN FINAL (ALEXO SE VA)
            { type: 'ACTION', action: () => { this.ian.visible = false; } }, // Ian se retira
            { type: 'MOVE', actor: 'ALEXO', x: 700, speed: 1 }, // Camina hacia ventana (derecha)
            { type: 'CAMERA_MOVE', x: 700, y: 280, speed: 0.015 }, // Cámara lo sigue
            
            // Cambio de escena fluido
            { type: 'FADE_OUT' },
            { type: 'SCENE', bg: 'WINDOW', cam: { x: 700, y: 280 }, action: () => { 
                this.alexo.x = 700; this.alexo.lookingAt = 'OUT';
            }},
            { type: 'FADE_IN' },

            // 5. ESCENA FINAL (CONTEMPLACIÓN)
            { type: 'WAIT', frames: 120 }, // Silencio
            { type: 'CAMERA_MOVE', x: 850, y: 250, speed: 0.005 }, // Zoom lento a la vista
            { type: 'DIALOG', text: "Qué bella se ve la noche desde aquí.", speaker: "" },
            { type: 'WAIT', frames: 180 },
            
            { type: 'FADE_TO_BLACK' },
            { type: 'END' }
        ];
    }

    runStep() {
        if (this.stepIndex >= this.script.length) return;
        const step = this.script[this.stepIndex];
        this.uiDialog.style.display = 'none';

        switch(step.type) {
            case 'SCENE':
                this.scene = step.bg;
                this.camera.targetX = step.cam.x;
                this.camera.targetY = step.cam.y;
                if (step.action) step.action();
                this.nextStep(); 
                break;
            case 'CAMERA_MOVE':
                this.camera.targetX = step.x;
                this.camera.targetY = step.y;
                this.nextStep();
                break;
            case 'FADE_OUT':
                this.fade = { opacity: 0, state: 'OUT', speed: 0.02 };
                const checkFadeOut = () => {
                    if(this.fade.opacity < 1) { requestAnimationFrame(checkFadeOut); }
                    else { this.nextStep(); }
                };
                checkFadeOut();
                break;
            case 'FADE_IN':
                this.fade = { opacity: 1, state: 'IN', speed: 0.02 };
                const checkFadeIn = () => {
                    if(this.fade.opacity > 0) { requestAnimationFrame(checkFadeIn); }
                    else { this.nextStep(); }
                };
                checkFadeIn();
                break;
            case 'ACTION':
                if (step.action) step.action();
                this.nextStep();
                break;
            case 'DIALOG':
                this.uiDialog.style.display = 'block';
                this.elSpeaker.innerText = step.speaker || "";
                this.elText.innerText = step.text;
                this.waitingForInput = true;
                break;
            case 'MOVE':
                this.handleMovement(step);
                break;
            case 'WAIT':
                setTimeout(() => this.nextStep(), (step.frames / 60) * 1000);
                break;
            case 'FADE_TO_BLACK':
                this.fade = { opacity: 0, state: 'OUT_FINAL', speed: 0.01 };
                setTimeout(() => this.nextStep(), 3000);
                break;
            case 'END':
                this.state = 'END';
                this.elText.innerText = "FIN DE LA TRANSMISIÓN";
                this.elSpeaker.innerText = "";
                this.uiDialog.style.display = 'block';
                break;
        }
    }

    handleMovement(step) {
        const actor = step.actor === 'ALEXO' ? this.alexo : this.ian;
        const target = step.x; 
        const animateMove = () => {
            const dx = target - actor.x;
            const dy = (step.y !== undefined ? step.y : actor.y) - actor.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < step.speed) {
                actor.x = target; actor.y = step.y !== undefined ? step.y : actor.y; this.nextStep();
            } else {
                actor.x += (dx/dist) * step.speed; actor.y += (dy/dist) * step.speed;
                requestAnimationFrame(animateMove);
            }
        };
        animateMove();
    }

    handleInput() {
        if (this.state === 'END') { location.reload(); return; }
        if (this.waitingForInput) {
            this.waitingForInput = false;
            this.uiDialog.style.display = 'none';
            this.stepIndex++;
            this.runStep();
        }
    }

    nextStep() {
        this.stepIndex++;
        this.runStep();
    }

    loop() {
        this.time++;
        this.update();
        this.draw();
        if(this.state !== 'STOPPED') requestAnimationFrame(this.loop);
    }

    update() {
        this.camera.x += (this.camera.targetX - this.camera.x) * 0.05;
        this.camera.y += (this.camera.targetY - this.camera.y) * 0.05;
        if (this.camera.shake > 0) this.camera.shake *= 0.9;
        
        if (this.fade) {
            if (this.fade.state === 'OUT') {
                this.fade.opacity += this.fade.speed;
                if (this.fade.opacity >= 1) this.fade.opacity = 1;
            } else if (this.fade.state === 'IN') {
                this.fade.opacity -= this.fade.speed;
                if (this.fade.opacity <= 0) this.fade.opacity = 0;
            } else if (this.fade.state === 'OUT_FINAL') {
                this.fade.opacity += 0.005;
            }
        }

        this.alexo.frame = Math.sin(this.time * 0.15) * 0.5;

        this.seagulls.forEach(s => {
            s.x += s.vx;
            s.y += Math.sin(this.time * 0.05) * 0.5;
            if(s.x > 1000) s.x = -50;
        });
    }

    draw() {
        // Limpiar pantalla
        this.ctx.fillStyle = "#050812";
        this.ctx.fillRect(0, 0, this.width, this.height);

        this.ctx.save();
        const shakeX = (Math.random() - 0.5) * this.camera.shake;
        const shakeY = (Math.random() - 0.5) * this.camera.shake;
        this.ctx.translate(this.width/2 - this.camera.x + shakeX, this.height/2 - this.camera.y + shakeY);

        // 1. DIBUJAR ESCENARIO (FONDO)
        if (this.scene === 'SALON') this.drawSalonExpanded();
        else if (this.scene === 'WINDOW') this.drawWindowExpanded();

        // 2. DIBUJAR PERSONAJES (CAPAS)
        if (this.alexo.visible !== false) this.drawAlexoPro(this.alexo.x, this.alexo.y, this.alexo.state, this.alexo.animState);

        if (this.ian.visible) this.drawIanPro(this.ian.x, this.ian.y, this.ian.holdingTray, this.ian.holdingPaper);

        this.ctx.restore();
        this.drawFade();
    }

    drawFade() {
        if (this.fade && this.fade.opacity > 0) {
            this.ctx.fillStyle = `rgba(0,0,0,${this.fade.opacity})`;
            this.ctx.fillRect(0, 0, this.width, this.height);
        }
    }

    // === DIBUJO DE ESCENAS ===

    drawSalonExpanded() {
        const ctx = this.ctx;
        
        // Pared (Fondo)
        ctx.fillStyle = "#2a2015"; 
        ctx.fillRect(0, 0, 960, this.height); 
        
        // Suelo
        ctx.fillStyle = "#3a3025"; 
        ctx.fillRect(0, this.floorY, 960, 500);

        // OBRA DE ARTE (Pared Izquierda - Detallado)
        ctx.fillStyle = "#1a1a1a"; 
        ctx.fillRect(150, 180, 140, 160); // Marco más elegante
        ctx.fillStyle = "#0a0a0a"; 
        ctx.fillRect(155, 185, 130, 150); // Lienzo
        ctx.strokeStyle = "#C0C0C0"; ctx.lineWidth=3; // Marco plateado
        ctx.strokeRect(150, 180, 140, 160);
        ctx.strokeStyle = "#554433"; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(160, 230); ctx.lineTo(270, 210); ctx.lineTo(210, 310); ctx.stroke(); // Arte abstracto

        // PLANTAS (Sector Izquierda/Centro)
        const drawPlant = (px, py) => {
            ctx.fillStyle = "#5D4037"; // Maceta oscura
            ctx.beginPath(); ctx.moveTo(px-20, py); ctx.lineTo(px+20, py); ctx.lineTo(px+15, py+40); ctx.lineTo(px-15, py+40); ctx.fill();
            ctx.fillStyle = "#2E7D32"; // Hojas verde oscuro
            for(let i=0; i<5; i++) {
                ctx.beginPath(); ctx.ellipse(px + Math.sin(i)*15, py - 20 - i*10, 10, 20, 0, 0, Math.PI*2); ctx.fill();
            }
        };
        drawPlant(350, this.floorY); 
        drawPlant(700, this.floorY); 

        // CORTINAS (En ventanas)
        for(let i=0; i<4; i++) {
            let wx = 90 + i*220;
            // Cortina Izq
            ctx.fillStyle = "#3E2723"; // Cortinas más oscuras
            ctx.beginPath(); ctx.moveTo(wx, 40); ctx.lineTo(wx+30, 100); ctx.lineTo(wx+10, 240); ctx.lineTo(wx, 240); ctx.fill();
            // Cortina Der
            ctx.beginPath(); ctx.moveTo(wx+130, 40); ctx.lineTo(wx+100, 100); ctx.lineTo(wx+120, 240); ctx.lineTo(wx+130, 240); ctx.fill();
            
            ctx.fillStyle = "#111"; ctx.fillRect(wx+30, 40, 70, 200); // Vidrio
        }

        // Luces (Normales de Gala)
        ctx.fillStyle = "#FFD700";
        for(let i=0; i<3; i++) {
            const cx = 220 + i*220;
            ctx.globalAlpha = 0.3 + Math.sin(this.time * 0.05 + i)*0.1;
            ctx.beginPath(); ctx.arc(cx, 40, 40, 0, Math.PI*2); ctx.fill();
            ctx.shadowColor = "#FFD700"; ctx.shadowBlur = 30;
            ctx.beginPath(); ctx.arc(cx, 40, 10, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        }
        ctx.globalAlpha = 1;

        // MESAS CON ADORNOS (Detallado)
        const tables = [250, 470, 690];
        tables.forEach(tx => {
            ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.ellipse(tx, this.floorY, 40, 12, 0, 0, Math.PI*2); ctx.fill();
            // Adorno Floral (Centerpiece)
            ctx.fillStyle = "#AAA"; ctx.fillRect(tx-5, this.floorY-15, 10, 15); // Florero
            ctx.fillStyle = "#FF69B4"; // Flor
            ctx.beginPath(); ctx.arc(tx, this.floorY-20, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#1B5E20"; ctx.beginPath(); ctx.ellipse(tx, this.floorY-18, 8, 4, 0, 0, Math.PI*2); ctx.fill();
        });
    }

    drawWindowExpanded() {
        const ctx = this.ctx;
        // Cielo
        const skyGrad = ctx.createLinearGradient(0, 0, 0, this.floorY);
        skyGrad.addColorStop(0, "#050812");
        skyGrad.addColorStop(0.7, "#2a1a40"); 
        skyGrad.addColorStop(1, "#403010");
        ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, 960, this.floorY);

        // Ciudad/Casas
        ctx.fillStyle = "#080808";
        for(let i=0; i<15; i++) {
            let h = 100 + Math.sin(i)*100;
            ctx.fillRect(i * 150 - 500, this.floorY - h, 120, h + 500);
            // Luces de casas
            if(i%3===0 && Math.random()>0.8) {
                ctx.fillStyle = "#FFD700"; ctx.fillRect(i*150-480, this.floorY-h+20, 5, 5);
                ctx.fillStyle = "#080808";
            }
        }

        // Barcos
        const drawBoat = (bx) => {
            ctx.fillStyle = "#555"; ctx.beginPath(); ctx.moveTo(bx, this.floorY); ctx.lineTo(bx+40, this.floorY); ctx.lineTo(bx+35, this.floorY+10); ctx.lineTo(bx+5, this.floorY+10); ctx.fill();
            ctx.fillStyle = "#FFF"; // Luz barco
            if(Math.sin(this.time*0.1 + bx) > 0.8) {
                ctx.beginPath(); ctx.arc(bx+20, this.floorY-5, 2, 0, Math.PI*2); ctx.fill();
            }
        };
        drawBoat(200);
        drawBoat(600);

        // Agua Estática
        ctx.fillStyle = "#051020"; ctx.fillRect(0, this.floorY, 960, 500);
        ctx.strokeStyle = "rgba(255,255,255,0.08)"; ctx.lineWidth=1;
        for(let i=0; i<this.waterLines.length; i++) {
            const line = this.waterLines[i];
            ctx.beginPath(); ctx.moveTo(line.x, this.floorY); ctx.lineTo(line.x, line.y); ctx.stroke();
        }

        // Gaviotas
        ctx.strokeStyle = "#FFF"; ctx.lineWidth=1.5;
        this.seagulls.forEach(s => {
            ctx.save(); ctx.translate(s.x, s.y);
            ctx.beginPath(); ctx.moveTo(-5, -2); ctx.lineTo(0, 2); ctx.lineTo(5, -2); ctx.stroke();
            ctx.restore();
        });

        // Reflejos de Luces en agua
        for(let i=0; i<10; i++) {
            if(Math.random()>0.95) {
                ctx.fillStyle = "#FFD700";
                ctx.fillRect(Math.random()*960, this.floorY + Math.random()*50, 1, 2);
            }
        }

        // Marco
        ctx.strokeStyle = "#2c2c2c"; ctx.lineWidth = 10;
        ctx.strokeRect(600, 50, 300, 300);
        ctx.beginPath(); ctx.moveTo(750, 50); ctx.lineTo(750, 350); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(600, 200); ctx.lineTo(900, 200); ctx.stroke();
    }

    // === PERSONAJES ===

    drawAlexoPro(x, y, state, animState) {
        const ctx = this.ctx; ctx.save(); ctx.translate(x, y);
        
        let headRot = 0;
        if(this.alexo.lookingAt === 'RIGHT') headRot = 0.2;
        if(this.alexo.lookingAt === 'LEFT') headRot = -0.2;
        if(this.alexo.lookingAt === 'OUT') headRot = -0.2;

        let workLean = 0;
        if (animState === 'WORK') workLean = Math.sin(this.time * 0.05) * 0.2;

        const bob = Math.sin(this.time * 0.1) * 2;
        
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.beginPath(); ctx.ellipse(0, 45, 35, 12, 0, 0, Math.PI*2); ctx.fill();

        const legSwing = Math.sin(this.time * 0.05) * 5;
        const drawLeg = (side, swing) => {
            ctx.save(); ctx.translate(side*12, 40 + bob); ctx.rotate(swing*side*0.02);
            ctx.fillStyle = "#555"; ctx.fillRect(-6, -20, 12, 25);
            ctx.beginPath(); ctx.arc(0, 5, 6, 0, Math.PI*2); ctx.fill();
            ctx.save(); ctx.rotate(swing*side*0.04);
            ctx.fillStyle = "#444"; ctx.fillRect(-5, 5, 10, 25);
            ctx.fillStyle = "#333"; ctx.fillRect(-7, 28, 14, 8);
            ctx.restore(); ctx.restore();
        };
        drawLeg(-1, legSwing); drawLeg(1, -legSwing);

        ctx.save(); ctx.rotate(workLean);
        ctx.fillStyle = "#666";
        ctx.beginPath(); ctx.moveTo(-22, -40 + bob); ctx.lineTo(22, -40 + bob); 
        ctx.lineTo(18, 40 + bob); ctx.lineTo(-18, 40 + bob); ctx.closePath(); ctx.fill();
        
        const corePulse = 0.5 + Math.sin(this.time * 0.1) * 0.5;
        ctx.shadowColor = "#00FF88"; ctx.shadowBlur = 10;
        ctx.fillStyle = `rgba(0, 255, 136, ${corePulse})`;
        ctx.beginPath(); ctx.arc(0, 0 + bob, 8, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#444"; ctx.fillRect(-15, 40 + bob, 30, 10);
        ctx.restore();

        ctx.save(); ctx.translate(0, -50 + bob); ctx.rotate(headRot);
        ctx.fillStyle = "#777";
        ctx.beginPath(); ctx.arc(0, 0, 22, Math.PI, 0); ctx.lineTo(22, 15); ctx.lineTo(-22, 15); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#00FF88"; ctx.shadowColor="#00FF88"; ctx.shadowBlur=8;
        ctx.fillRect(-18, -5, 36, 8); ctx.shadowBlur=0;
        ctx.strokeStyle="#555"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(0,-35); ctx.stroke();
        ctx.fillStyle="red"; ctx.beginPath(); ctx.arc(0,-35, 2, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        const armSwing = Math.sin(this.time * 0.1) * 5;
        const drawArm = (side, swing) => {
            ctx.save(); ctx.translate(side*22, -30 + bob); ctx.rotate(swing*side*0.02);
            ctx.fillStyle = "#555"; ctx.fillRect(-5, 0, 10, 25);
            ctx.fillStyle = "#333"; ctx.fillRect(-4, 22, 8, 15);
            ctx.fillStyle = "#222"; ctx.beginPath(); ctx.arc(0, 38, 5, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        };
        drawArm(-1, armSwing); drawArm(1, -armSwing);

        ctx.restore();
    }

    drawIanPro(x, y, hasTray, hasPaper) {
        const ctx = this.ctx; ctx.save(); ctx.translate(x, y);
        const bob = Math.sin(this.time * 0.1) * 2;
        ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.beginPath(); ctx.ellipse(0, 5, 25, 8, 0, 0, Math.PI*2); ctx.fill();
        const legSwing = Math.sin(this.time * 0.1) * 5;
        ctx.strokeStyle = "#0a0a0a"; ctx.lineWidth = 8; ctx.lineCap="round";
        ctx.beginPath(); ctx.moveTo(-8, 0+bob); ctx.lineTo(-8-legSwing, 35+bob); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(8, 0+bob); ctx.lineTo(8+legSwing, 35+bob); ctx.stroke();
        ctx.fillStyle = "#111"; ctx.beginPath(); ctx.moveTo(-16, -55 + bob); ctx.lineTo(16, -55 + bob); ctx.lineTo(12, 0 + bob); ctx.lineTo(-12, 0 + bob); ctx.fill();
        ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.moveTo(0,-55+bob); ctx.lineTo(8,-50+bob); ctx.lineTo(0,-40+bob); ctx.lineTo(-8,-50+bob); ctx.fill();
        ctx.fillStyle = "#111"; ctx.fillRect(-5, -45+bob, 10, 4); ctx.strokeStyle = "#111"; ctx.lineWidth = 7;
        
        // Brazo Izquierdo
        ctx.beginPath(); ctx.moveTo(-16, -50+bob); ctx.lineTo(-18, 0+bob); ctx.stroke(); 
        
        // Brazo Derecho (Saca papel)
        if (this.ian.paperAnim > 0) {
            this.ian.paperAnim -= 0.05;
            // Animación de sacar
            ctx.save(); ctx.translate(16 + this.ian.paperAnim*20, -50 - this.ian.paperAnim*10); ctx.rotate(-0.3);
            ctx.fillStyle = "#EEE"; ctx.fillRect(0, 0, 30, 40); ctx.fillStyle = "#000"; ctx.font="8px monospace"; ctx.fillText("...", 2, 10); ctx.restore();
        } else if (hasPaper) {
             ctx.save(); ctx.translate(35, -50+bob); ctx.rotate(-0.3); ctx.fillStyle = "#EEE"; ctx.fillRect(0, 0, 30, 40); ctx.fillStyle = "#000"; ctx.font="8px monospace"; ctx.fillText("...", 2, 10); ctx.restore();
        } else {
            ctx.beginPath(); ctx.moveTo(16, -50+bob); ctx.lineTo(20, -15+bob); ctx.stroke();
        }
        
        if (hasTray && !hasPaper) {
            ctx.save(); ctx.translate(35, -5+bob); ctx.fillStyle = "#AAA"; ctx.beginPath(); ctx.ellipse(0, 0, 25, 8, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.moveTo(-5, -5); ctx.lineTo(-3, -20); ctx.lineTo(3, -20); ctx.lineTo(5, -5); ctx.fill();
            ctx.fillStyle = "#800"; ctx.fillRect(-3, -15, 6, 8); ctx.restore();
        }

        // HEAD & FACE (FIJO)
        ctx.save(); ctx.translate(0, -65 + bob);
        ctx.fillStyle = "#dcb"; ctx.beginPath(); ctx.ellipse(0, 0, 12, 15, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#111"; ctx.beginPath(); ctx.arc(0, -12, 12, Math.PI, 0); ctx.fill();
        
        ctx.fillStyle = "#FFF"; 
        ctx.beginPath(); ctx.ellipse(-2, -3, 3, 4, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(3, -3, 3, 4, 0, 0, Math.PI*2); ctx.fill();
        
        ctx.fillStyle = "#000"; 
        ctx.beginPath(); ctx.arc(-2, -3, 1, 0, Math.PI*2); ctx.fill(); 
        ctx.beginPath(); ctx.arc(3, -3, 1, 0, Math.PI*2); ctx.fill();
        
        ctx.restore(); ctx.restore();
    }
}

window.onload = () => { new CinematicGame(); };
</script>
