<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexo: El Rescate - Arte Mejorado</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Condensed:wght@300;400;700&display=swap');

        :root {
            --primary: #00FF88;
            --danger: #FF4400;
            --ui-bg: rgba(0, 0, 0, 0.85);
            --text-main: #e0e0e0;
        }

        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Roboto Condensed', sans-serif;
            overflow: hidden;
            color: var(--text-main);
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 960px;
            height: 540px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
            background: #050505;
            overflow: hidden;
            cursor: pointer;
            border-top: 40px solid #000;
            border-bottom: 40px solid #000;
            box-sizing: content-box; 
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated; /* Opcional: quitar si se ve borroso en monitores HD */
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 40px;
        }

        #subtitle-box {
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            width: 100%;
            min-height: 80px;
            display: none;
            text-align: center;
            padding-top: 20px;
            pointer-events: none;
        }

        #subtitle-text {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 22px;
            color: #FFF;
            text-shadow: 0 2px 4px #000;
            letter-spacing: 0.5px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #prompt-indicator {
            position: absolute;
            bottom: 60px;
            right: 40px;
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            animation: pulse 2s infinite;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #title-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: auto;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 60px;
            color: var(--primary);
            text-shadow: 0 0 30px var(--primary);
            margin: 0;
            letter-spacing: 5px;
        }

        .btn-start {
            margin-top: 40px;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-start:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }

        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        
        .film-grain {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 50; opacity: 0.4;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="g" width="960" height="540"></canvas>
        <div class="film-grain"></div>

        <div id="title-screen">
            <h1>ALEXO</h1>
            <p style="color: #888; margin-top: 10px;">PROTOCOLO: RESCATE</p>
            <button class="btn-start" id="start-btn">INICIAR SECUENCIA</button>
        </div>

        <div id="ui-layer">
            <div id="subtitle-box">
                <div id="subtitle-text"></div>
            </div>
            <div id="prompt-indicator">▼ AVANZAR</div>
        </div>
    </div>

<script>
/**
 * ALEXO: CINEMATIC ENGINE (CHARACTER UPDATE)
 * Vector art for characters: Alexo (Robot), Ian (Human), Kid.
 */
class CinematicGame {
    constructor() {
        this.canvas = document.getElementById('g');
        this.ctx = this.canvas.getContext('2d');
        this.width = this.canvas.width;
        this.height = this.canvas.height;

        // Camera System
        this.camera = { x: 0, y: 0, targetX: 0, targetY: 0, shake: 0 };

        // UI
        this.uiTitle = document.getElementById('title-screen');
        this.uiSubBox = document.getElementById('subtitle-box');
        this.uiSubText = document.getElementById('subtitle-text');
        this.uiPrompt = document.getElementById('prompt-indicator');

        // State
        this.state = 'TITLE'; 
        this.stepIndex = 0;
        this.waitingForInput = false;
        
        // Entities
        this.alexo = { x: 480, y: 350, state: 'IDLE', facing: 1, frame: 0 };
        this.kid = { x: 0, y: 0, visible: false, state: 'HIDING' }; 
        this.ian = { x: 700, y: 350, visible: false };

        // Environment
        this.ambience = { fire: 0, smoke: 0, darkness: 0 };
        this.particles = [];
        this.time = 0;

        // Script (The Director)
        this.script = this.getDirectorScript();

        // Init
        document.getElementById('start-btn').addEventListener('click', () => this.start());
        document.getElementById('game-container').addEventListener('click', () => this.handleInput());
        
        this.loop = this.loop.bind(this);
    }

    start() {
        this.uiTitle.style.display = 'none';
        this.state = 'PLAYING';
        this.runStep();
        requestAnimationFrame(this.loop);
    }

    // === THE DIRECTOR'S SCRIPT (Mismo guion, mejor ejecución) ===
    getDirectorScript() {
        return [
            { type: 'SCENE', bg: 'SALON', cam: { x: 480, y: 300, zoom: 1 }, action: () => { this.alexo.x = 400; this.alexo.y = 380; this.ian.visible = true; this.ian.x = 600; } },
            { type: 'DIALOG', text: "Arcadia. La noche de gala está a punto de comenzar.", speaker: "" },
            { type: 'DIALOG', text: "Ian termina de ajustar los manteles. Alexo observa la sala en silencio.", speaker: "" },
            { type: 'DIALOG', text: "¿Crees que alguien notará si pongo un poquito menos de caviar?", speaker: "Ian" },
            { type: 'FOCUS', target: 'WINDOW', duration: 60 },
            { type: 'DIALOG', text: "Alexo no responde. Sus sensores captan una variación térmica en la zona sur.", speaker: "" },
            { type: 'SCENE', bg: 'WINDOW_VIEW', cam: { x: 480, y: 300 }, action: () => { this.ian.visible = false; this.alexo.visible = false; } },
            { type: 'CAMERA_MOVE', x: 700, y: 250, speed: 0.02 },
            { type: 'WAIT', frames: 120 },
            { type: 'EFFECT', name: 'ALERT' },
            { type: 'DIALOG', text: "Torre Residencial Omega. Incendio confirmado. Piso 11.", speaker: "ALEXO (SYSTEM)" },
            { type: 'DIALOG', text: "Señal de vida detectada. Patrón biológico: Infantil.", speaker: "ALEXO (SYSTEM)" },
            { type: 'SCENE', bg: 'SALON', cam: { x: 400, y: 350 }, action: () => { this.alexo.visible = true; this.ian.visible = true; this.alexo.x = 400; } },
            { type: 'DIALOG', text: "¿Adónde vas? ¡La gala empieza en minutos!", speaker: "Ian" },
            { type: 'MOVE', actor: 'ALEXO', x: -100, speed: 4 },
            { type: 'DIALOG', text: "¡Alexo!", speaker: "Ian" },
            { type: 'SCENE', bg: 'STREET_RUN', cam: { x: 0, y: 300 }, action: () => { this.alexo.x = 100; this.alexo.state = 'RUN'; } },
            { type: 'CAMERA_MOVE', x: 2000, y: 300, speed: 0.008 },
            { type: 'WAIT', frames: 180 },
            { type: 'SCENE', bg: 'HALLWAY_DARK', cam: { x: 480, y: 270 }, action: () => { this.alexo.x = 480; this.alexo.y = 400; this.alexo.state = 'WALK'; this.ambience.darkness = 0.9; } },
            { type: 'MOVE', actor: 'ALEXO', x: 480, y: 150, speed: 2 },
            { type: 'CAMERA_MOVE', x: 480, y: 150, speed: 0.05 },
            { type: 'DIALOG', text: "Estructura comprometida. Niveles de monóxido de carbono críticos.", speaker: "ALEXO (SYSTEM)" },
            { type: 'SCENE', bg: 'APARTMENT_FIRE', cam: { x: 480, y: 270 }, action: () => { this.alexo.x = 300; this.alexo.y = 350; this.kid.visible = true; this.kid.x = 700; this.kid.y = 380; this.ambience.fire = 1; }},
            { type: 'MOVE', actor: 'ALEXO', x: 650, speed: 5 },
            { type: 'MOVE', actor: 'KID', x: 620, speed: 2 },
            { type: 'DIALOG', text: "Tengo miedo...", speaker: "NIÑO" },
            { type: 'DIALOG', text: "No te preocupes. Estoy aquí para sacarte.", speaker: "ALEXO" },
            { type: 'ANIMATION', actor: 'BOTH', anim: 'HUG' },
            { type: 'WAIT', frames: 100 },
            { type: 'DIALOG', text: "Agárrate fuerte a mi espalda.", speaker: "ALEXO" },
            { type: 'SCENE', bg: 'STAIRS_DOWN', cam: { x: 480, y: 400 }, action: () => { this.alexo.state = 'CARRY'; this.alexo.x = 480; this.alexo.y = 400; } },
            { type: 'MOVE', actor: 'ALEXO', x: 480, y: 100, speed: 3 },
            { type: 'CAMERA_MOVE', x: 480, y: 100, speed: 0.04 },
            { type: 'EFFECT', name: 'SHAKE' },
            { type: 'SCENE', bg: 'HALLWAY_LIGHT', cam: { x: 480, y: 270 }, action: () => { this.alexo.y = 270; this.ambience.fire = 0; this.ambience.darkness = 0.3; } },
            { type: 'MOVE', actor: 'ALEXO', x: 500, speed: 2 }, // Handoff point
            { type: 'DIALOG', text: "¡Aquí! ¡Por aquí!", speaker: "RESCATISTA" },
            { type: 'ANIMATION', actor: 'HANDOFF' },
            { type: 'DIALOG', text: "Está bien. Está respirando.", speaker: "RESCATISTA" },
            { type: 'MOVE', actor: 'ALEXO', x: -100, speed: 2 },
            { type: 'SCENE', bg: 'EXIT_DOOR', cam: { x: 480, y: 270 }, action: () => { this.alexo.x = 480; this.alexo.y = 270; } },
            { type: 'MOVE', actor: 'ALEXO', x: 480, y: 350, speed: 1.5 },
            { type: 'WAIT', frames: 60 },
            { type: 'FADE_TO_BLACK' },
            { type: 'DIALOG', text: "Alexo desaparece en la niebla de la noche.", speaker: "" },
            { type: 'END' }
        ];
    }

    runStep() {
        if (this.stepIndex >= this.script.length) return;
        const step = this.script[this.stepIndex];
        this.uiPrompt.style.opacity = '0';
        this.uiSubBox.style.display = 'none';

        switch(step.type) {
            case 'SCENE':
                this.scene = step.bg;
                this.camera.targetX = step.cam.x;
                this.camera.targetY = step.cam.y;
                if (step.action) step.action();
                this.nextStep(); 
                break;
            case 'FOCUS':
                if (step.target === 'WINDOW') this.camera.targetX = 800;
                setTimeout(() => this.nextStep(), 1500);
                break;
            case 'CAMERA_MOVE':
                this.camera.targetX = step.x;
                this.camera.targetY = step.y;
                this.nextStep();
                break;
            case 'DIALOG':
                this.uiSubBox.style.display = 'block';
                this.uiSubText.style.opacity = '0';
                this.uiSubText.innerText = (step.speaker ? step.speaker + ": " : "") + step.text;
                setTimeout(() => this.uiSubText.style.opacity = '1', 100);
                this.waitingForInput = true;
                this.uiPrompt.style.opacity = '1';
                break;
            case 'MOVE':
                this.handleMovement(step);
                break;
            case 'WAIT':
                setTimeout(() => this.nextStep(), (step.frames / 60) * 1000);
                break;
            case 'EFFECT':
                if (step.name === 'ALERT') this.triggerAlert();
                if (step.name === 'SHAKE') this.camera.shake = 20;
                this.nextStep();
                break;
            case 'ANIMATION':
                if (step.anim === 'HUG') {
                    this.alexo.state = 'IDLE';
                    this.kid.x = this.alexo.x;
                }
                this.nextStep();
                break;
            case 'FADE_TO_BLACK':
                this.ambience.darkness = 1;
                setTimeout(() => this.nextStep(), 2000);
                break;
            case 'END':
                this.state = 'END';
                this.uiSubText.innerText = "FIN DE LA TRANSMISIÓN";
                this.uiSubBox.style.display = 'block';
                this.uiSubText.style.opacity = '1';
                break;
        }
    }

    handleMovement(step) {
        const actor = step.actor === 'ALEXO' ? this.alexo : (step.actor === 'KID' ? this.kid : this.ian);
        const target = step.x; 
        const animateMove = () => {
            const dx = target - actor.x;
            const dy = (step.y !== undefined ? step.y : actor.y) - actor.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist < step.speed) {
                actor.x = target;
                actor.y = step.y !== undefined ? step.y : actor.y;
                this.nextStep();
            } else {
                actor.x += (dx/dist) * step.speed;
                actor.y += (dy/dist) * step.speed;
                requestAnimationFrame(animateMove);
            }
        };
        animateMove();
    }

    handleInput() {
        if (this.state === 'END') { location.reload(); return; }
        if (this.waitingForInput) {
            this.waitingForInput = false;
            this.stepIndex++;
            this.runStep();
        }
    }

    nextStep() {
        this.stepIndex++;
        this.runStep();
    }

    triggerAlert() {
        const alertDiv = document.createElement('div');
        alertDiv.style.position = 'absolute';
        alertDiv.style.top = '20%'; alertDiv.style.left = '50%';
        alertDiv.style.transform = 'translate(-50%, -50%)';
        alertDiv.style.color = 'red';
        alertDiv.style.fontFamily = 'Orbitron';
        alertDiv.style.fontSize = '40px';
        alertDiv.style.border = '2px solid red';
        alertDiv.style.padding = '10px 20px';
        alertDiv.innerText = "PELIGRO";
        document.getElementById('game-container').appendChild(alertDiv);
        setTimeout(() => alertDiv.remove(), 1000);
    }

    loop() {
        this.time++;
        this.update();
        this.draw();
        if(this.state !== 'STOPPED') requestAnimationFrame(this.loop);
    }

    update() {
        this.camera.x += (this.camera.targetX - this.camera.x) * 0.05;
        this.camera.y += (this.camera.targetY - this.camera.y) * 0.05;
        if (this.camera.shake > 0) this.camera.shake *= 0.9;

        this.alexo.frame = Math.sin(this.time * 0.2) * 0.5;
        
        if (this.ambience.fire > 0 && Math.random() > 0.5) {
            this.particles.push({
                x: Math.random() * this.width,
                y: this.height + 20,
                vx: (Math.random() - 0.5) * 2,
                vy: -Math.random() * 3 - 1,
                life: 1.0,
                type: 'FIRE'
            });
        }
        for (let i = this.particles.length - 1; i >= 0; i--) {
            let p = this.particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02;
            if (p.life <= 0) this.particles.splice(i, 1);
        }
    }

    draw() {
        this.ctx.fillStyle = "#050505";
        this.ctx.fillRect(0, 0, this.width, this.height);

        this.ctx.save();
        const shakeX = (Math.random() - 0.5) * this.camera.shake;
        const shakeY = (Math.random() - 0.5) * this.camera.shake;
        this.ctx.translate(this.width/2 - this.camera.x + shakeX, this.height/2 - this.camera.y + shakeY);

        if (this.scene === 'SALON') this.drawSalon();
        else if (this.scene === 'WINDOW_VIEW') this.drawCityView();
        else if (this.scene === 'STREET_RUN') this.drawStreetRun();
        else if (this.scene === 'HALLWAY_DARK') this.drawHallway(true);
        else if (this.scene === 'APARTMENT_FIRE') this.drawApartment();
        else if (this.scene === 'STAIRS_DOWN') this.drawStairs();
        else if (this.scene === 'HALLWAY_LIGHT') this.drawHallway(false);
        else if (this.scene === 'EXIT_DOOR') this.drawExitDoor();

        if (this.alexo.visible !== false) this.drawAlexoPro(this.alexo.x, this.alexo.y, this.alexo.state);
        if (this.ian.visible) this.drawIanPro(this.ian.x, this.ian.y);
        if (this.kid.visible) this.drawKidPro(this.kid.x, this.kid.y, this.kid.state);

        this.ctx.restore();
        this.drawLighting();
    }

    // === SCENES ===
    drawSalon() {
        this.ctx.fillStyle = "#1a1510"; this.ctx.fillRect(-1000, 300, 3000, 500);
        this.ctx.fillStyle = "#2a2015"; this.ctx.fillRect(-1000, -1000, 3000, 600);
        for(let i=-2; i<4; i++) {
            this.ctx.fillStyle = "#050510"; this.ctx.fillRect(i*250 - 50, 50, 150, 200);
        }
        this.ctx.fillStyle = "#FFD700";
        for(let i=0; i<3; i++) {
            this.ctx.globalAlpha = 0.3 + Math.sin(this.time * 0.05 + i)*0.1;
            this.ctx.beginPath(); this.ctx.arc(i*300 + 150, 50, 30, 0, Math.PI*2); this.ctx.fill();
        }
        this.ctx.globalAlpha = 1;
    }
    drawCityView() {
        const grad = this.ctx.createLinearGradient(0, -500, 0, 500);
        grad.addColorStop(0, "#020205"); grad.addColorStop(1, "#1a0505");
        this.ctx.fillStyle = grad; this.ctx.fillRect(-1000, -1000, 3000, 2000);
        this.ctx.fillStyle = "#080808";
        for(let i=0; i<20; i++) {
            let h = 200 + Math.random() * 300;
            this.ctx.fillRect(i * 150 - 500, 300 - h, 120, h + 500);
        }
        this.ctx.fillStyle = "#220505"; this.ctx.fillRect(600, -100, 150, 800);
        this.ctx.shadowBlur = 50; this.ctx.shadowColor = "orange";
        this.ctx.fillStyle = "rgba(255, 100, 0, 0.5)";
        this.ctx.beginPath(); this.ctx.arc(675, 150, 80, 0, Math.PI*2); this.ctx.fill();
        this.ctx.shadowBlur = 0;
    }
    drawStreetRun() {
        this.ctx.fillStyle = "#111";
        this.ctx.beginPath();
        this.ctx.moveTo(-1000, 500); this.ctx.lineTo(10000, 500); 
        this.ctx.lineTo(10000, 800); this.ctx.lineTo(-1000, 800); this.ctx.fill();
        this.ctx.fillStyle = "#050505";
        for(let i = -10; i < 50; i++) {
            this.ctx.fillRect(i * 300, 300, 200, 500);
        }
        const fireWorldX = 2000;
        this.ctx.shadowBlur = 100; this.ctx.shadowColor = "red";
        this.ctx.fillStyle = "rgba(255, 50, 0, 0.2)"; this.ctx.fillRect(fireWorldX - 200, 0, 400, 600);
        this.ctx.shadowBlur = 0;
    }
    drawHallway(isDark) {
        this.ctx.fillStyle = "#0a0a0a"; this.ctx.fillRect(-500, -200, 2000, 800);
        this.ctx.fillStyle = "#151515"; this.ctx.fillRect(-500, -200, 2000, 200); // Ceiling
        this.ctx.fillRect(-500, 400, 2000, 200); // Floor
        this.ctx.strokeStyle = "#333"; this.ctx.beginPath();
        this.ctx.moveTo(-400, 400); this.ctx.lineTo(400, 100);
        this.ctx.moveTo(1400, 400); this.ctx.lineTo(600, 100); this.ctx.stroke();
        if (isDark) {
            this.ctx.shadowBlur = 80; this.ctx.shadowColor = "red";
            this.ctx.fillStyle = "rgba(255, 0, 0, 0.3)";
            this.ctx.beginPath(); this.ctx.arc(480, 100, 50, 0, Math.PI*2); this.ctx.fill();
            this.ctx.shadowBlur = 0;
        }
    }
    drawApartment() {
        this.ctx.fillStyle = "#2a1005"; this.ctx.fillRect(0, 0, 960, 540);
        this.ctx.shadowBlur = 60; this.ctx.shadowColor = "orange";
        this.ctx.fillStyle = "#ff4400"; this.ctx.fillRect(600, 50, 200, 200);
        this.ctx.shadowBlur = 0;
        this.ctx.fillStyle = "#1a0a00";
        this.ctx.fillRect(100, 350, 150, 80); 
        this.ctx.fillRect(50, 100, 50, 150);
        this.ctx.fillStyle = "rgba(0,0,0,0.5)"; this.ctx.fillRect(0, 0, 960, 540);
    }
    drawStairs() {
        this.ctx.fillStyle = "#111"; this.ctx.fillRect(0, 0, 960, 540);
        this.ctx.strokeStyle = "#222"; this.ctx.lineWidth = 4;
        for(let i=0; i<10; i++) {
            let y = 50 + i * 50;
            this.ctx.beginPath(); this.ctx.moveTo(300, y); this.ctx.lineTo(660, y); this.ctx.stroke();
        }
        this.ctx.strokeStyle = "#444"; this.ctx.beginPath();
        this.ctx.moveTo(310, 50); this.ctx.lineTo(310, 550);
        this.ctx.moveTo(650, 50); this.ctx.lineTo(650, 550); this.ctx.stroke();
    }
    drawExitDoor() {
        this.ctx.fillStyle = "#080808"; this.ctx.fillRect(0, 0, 960, 540);
        this.ctx.fillStyle = "#222"; this.ctx.fillRect(400, 150, 160, 300);
        this.ctx.strokeStyle = "#444"; this.ctx.strokeRect(400, 150, 160, 300);
        this.ctx.shadowBlur = 50; this.ctx.shadowColor = "#00FF88";
        this.ctx.fillStyle = "rgba(0, 255, 136, 0.1)";
        this.ctx.fillRect(410, 160, 140, 280); this.ctx.shadowBlur = 0;
    }

    // === NEW CHARACTER ART ===

    drawAlexoPro(x, y, state) {
        const ctx = this.ctx;
        ctx.save(); ctx.translate(x, y);
        
        // Run lean
        if (state === 'RUN') ctx.rotate(0.2);
        
        // Bobbing
        const bob = Math.sin(this.time * 0.2) * (state === 'RUN' ? 5 : 2);
        
        // Shadow
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.beginPath(); ctx.ellipse(0, 45, 35, 12, 0, 0, Math.PI*2); ctx.fill();

        // --- LEGS (Mechanical) ---
        const legSwing = Math.sin(this.time * 0.3) * (state === 'RUN' ? 25 : 10);
        
        // Left Leg
        ctx.save(); ctx.translate(-12, 40 + bob); ctx.rotate(legSwing * 0.02);
        ctx.fillStyle = "#555"; ctx.fillRect(-6, -20, 12, 25); // Thigh
        ctx.beginPath(); ctx.arc(0, 5, 6, 0, Math.PI*2); ctx.fill(); // Knee
        ctx.save(); ctx.rotate(legSwing * 0.04);
        ctx.fillStyle = "#444"; ctx.fillRect(-5, 5, 10, 25); // Shin
        ctx.fillStyle = "#333"; ctx.fillRect(-7, 28, 14, 8); // Foot
        ctx.restore(); ctx.restore();

        // Right Leg (Opposite)
        ctx.save(); ctx.translate(12, 40 + bob); ctx.rotate(-legSwing * 0.02);
        ctx.fillStyle = "#555"; ctx.fillRect(-6, -20, 12, 25);
        ctx.beginPath(); ctx.arc(0, 5, 6, 0, Math.PI*2); ctx.fill();
        ctx.save(); ctx.rotate(-legSwing * 0.04);
        ctx.fillStyle = "#444"; ctx.fillRect(-5, 5, 10, 25);
        ctx.fillStyle = "#333"; ctx.fillRect(-7, 28, 14, 8);
        ctx.restore(); ctx.restore();

        // --- BODY ---
        ctx.fillStyle = "#666"; // Chest plate
        ctx.beginPath();
        ctx.moveTo(-22, -40 + bob); ctx.lineTo(22, -40 + bob); 
        ctx.lineTo(18, 40 + bob); ctx.lineTo(-18, 40 + bob); 
        ctx.closePath(); ctx.fill();

        // Chest Core (Glowing)
        const corePulse = 0.5 + Math.sin(this.time * 0.1) * 0.5;
        ctx.shadowColor = "#00FF88"; ctx.shadowBlur = 10;
        ctx.fillStyle = `rgba(0, 255, 136, ${corePulse})`;
        ctx.beginPath(); ctx.arc(0, 0 + bob, 8, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        // Waist
        ctx.fillStyle = "#444"; ctx.fillRect(-15, 40 + bob, 30, 10);

        // --- HEAD ---
        ctx.save(); ctx.translate(0, -50 + bob);
        
        // Helmet shape
        ctx.fillStyle = "#777";
        ctx.beginPath();
        ctx.arc(0, 0, 22, Math.PI, 0); // Dome
        ctx.lineTo(22, 15);
        ctx.lineTo(-22, 15);
        ctx.closePath(); ctx.fill();

        // Visor (Eye)
        ctx.fillStyle = "#00FF88";
        ctx.shadowColor = "#00FF88"; ctx.shadowBlur = 8;
        ctx.fillRect(-18, -5, 36, 8); 
        ctx.shadowBlur = 0;

        // Antenna
        ctx.strokeStyle = "#555"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, -22); ctx.lineTo(0, -35); ctx.stroke();
        ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(0, -35, 2, 0, Math.PI*2); ctx.fill();

        ctx.restore(); // End Head

        // --- ARMS ---
        const armSwing = Math.sin(this.time * 0.3) * (state === 'RUN' ? 30 : 5);
        
        // Left Arm
        ctx.save(); ctx.translate(-22, -30 + bob); ctx.rotate(armSwing * 0.02);
        ctx.fillStyle = "#555"; ctx.fillRect(-5, 0, 10, 25); // Upper
        ctx.fillStyle = "#333"; ctx.fillRect(-4, 22, 8, 15); // Forearm
        ctx.fillStyle = "#222"; // Hand
        ctx.beginPath(); ctx.arc(0, 38, 5, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        // Right Arm
        ctx.save(); ctx.translate(22, -30 + bob); ctx.rotate(-armSwing * 0.02);
        ctx.fillStyle = "#555"; ctx.fillRect(-5, 0, 10, 25);
        ctx.fillStyle = "#333"; ctx.fillRect(-4, 22, 8, 15);
        ctx.fillStyle = "#222";
        ctx.beginPath(); ctx.arc(0, 38, 5, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        // --- CARRYING KID ---
        if (state === 'CARRY') {
            ctx.save();
            ctx.translate(5, -30 + bob);
            // Kid on back (simple shapes)
            ctx.fillStyle = "#dcb"; // Head
            ctx.beginPath(); ctx.arc(0, -25, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#F55"; // Body
            ctx.fillRect(-8, -15, 16, 20);
            // Legs hanging
            ctx.fillStyle = "#F55";
            ctx.fillRect(-8, 5, 6, 15);
            ctx.fillRect(2, 5, 6, 15);
            // Arms around neck (Alexo's neck)
            ctx.fillStyle = "#dcb";
            ctx.fillRect(-15, -20, 10, 5);
            ctx.fillRect(5, -20, 10, 5);
            ctx.restore();
        }

        ctx.restore();
    }

    drawIanPro(x, y) {
        const ctx = this.ctx;
        ctx.save(); ctx.translate(x, y);
        
        const bob = Math.sin(this.time * 0.1) * 2;
        
        // Shadow
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.beginPath(); ctx.ellipse(0, 5, 25, 8, 0, 0, Math.PI*2); ctx.fill();

        // --- LEGS (Human) ---
        const legSwing = Math.sin(this.time * 0.1) * 5;
        
        ctx.strokeStyle = "#0a0a0a"; ctx.lineWidth = 8;
        ctx.lineCap = "round";
        
        // Left Leg
        ctx.beginPath();
        ctx.moveTo(-8, 0 + bob); 
        ctx.lineTo(-8 - legSwing, 35 + bob); 
        ctx.stroke();

        // Right Leg
        ctx.beginPath();
        ctx.moveTo(8, 0 + bob); 
        ctx.lineTo(8 + legSwing, 35 + bob); 
        ctx.stroke();

        // --- TORSO (Suit) ---
        ctx.fillStyle = "#111";
        ctx.beginPath();
        ctx.moveTo(-16, -55 + bob); ctx.lineTo(16, -55 + bob);
        ctx.lineTo(12, 0 + bob); ctx.lineTo(-12, 0 + bob);
        ctx.fill();
        
        // Shirt & Bowtie
        ctx.fillStyle = "#FFF";
        ctx.beginPath(); ctx.moveTo(0, -55 + bob); ctx.lineTo(8, -50 + bob); ctx.lineTo(0, -40 + bob); ctx.lineTo(-8, -50 + bob); ctx.fill();
        ctx.fillStyle = "#111"; // Bowtie
        ctx.fillRect(-5, -45 + bob, 10, 4);

        // --- ARMS ---
        // Left Arm (Down)
        ctx.strokeStyle = "#111"; ctx.lineWidth = 7;
        ctx.beginPath(); ctx.moveTo(-16, -50 + bob); ctx.lineTo(-18, 0 + bob); ctx.stroke();

        // Right Arm (Holding Tray)
        ctx.beginPath(); ctx.moveTo(16, -50 + bob); ctx.lineTo(20, -15 + bob); ctx.stroke(); // Upper
        ctx.beginPath(); ctx.moveTo(20, -15 + bob); ctx.lineTo(30, -10 + bob); ctx.stroke(); // Forearm

        // Hand
        ctx.fillStyle = "#dcb"; ctx.beginPath(); ctx.arc(32, -10 + bob, 4, 0, Math.PI*2); ctx.fill();

        // --- TRAY ---
        ctx.save(); ctx.translate(35, -5 + bob);
        ctx.fillStyle = "#AAA"; // Tray
        ctx.beginPath(); ctx.ellipse(0, 0, 25, 8, 0, 0, Math.PI*2); ctx.fill();
        
        // Glass of Wine
        ctx.fillStyle = "#FFF";
        ctx.beginPath(); ctx.moveTo(-5, -5); ctx.lineTo(-3, -20); ctx.lineTo(3, -20); ctx.lineTo(5, -5); ctx.fill(); // Stem/Glass
        ctx.fillStyle = "#800"; ctx.fillRect(-3, -15, 6, 8); // Wine
        ctx.restore();

        // --- HEAD ---
        ctx.save(); ctx.translate(0, -65 + bob);
        ctx.fillStyle = "#dcb"; // Skin
        ctx.beginPath(); ctx.ellipse(0, 0, 12, 15, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#111"; // Hair
        ctx.beginPath(); ctx.arc(0, -12, 12, Math.PI, 0); ctx.fill();
        ctx.fillStyle = "#000"; // Eyes (Profile)
        ctx.fillRect(2, -3, 2, 2);
        ctx.restore();

        ctx.restore();
    }

    drawKidPro(x, y, state) {
        const ctx = this.ctx;
        ctx.save(); ctx.translate(x, y);
        
        const shake = state === 'CRY' ? (Math.random()-0.5)*3 : 0;
        
        // Shadow
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath(); ctx.ellipse(0, 10, 10, 4, 0, 0, Math.PI*2); ctx.fill();

        // --- BODY (Red Pajamas) ---
        ctx.fillStyle = "#d32f2f";
        ctx.fillRect(-12 + shake, -30, 24, 30);
        
        // Arms
        ctx.fillStyle = "#d32f2f";
        ctx.beginPath(); ctx.ellipse(-14 + shake, -15, 5, 8, 0.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(14 + shake, -15, 5, 8, -0.5, 0, Math.PI*2); ctx.fill();

        // --- HEAD (Big) ---
        ctx.save(); ctx.translate(0 + shake, -42);
        ctx.fillStyle = "#e0ac69"; // Skin
        ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.fill();
        
        // Hair
        ctx.fillStyle = "#3e2723";
        ctx.beginPath(); ctx.arc(0, -10, 14, Math.PI, 0); ctx.fill();

        // Eyes (Scared / Crying)
        ctx.fillStyle = "#FFF";
        ctx.beginPath(); ctx.ellipse(-5, -2, 3, 4, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(5, -2, 3, 4, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(-5, -2, 1, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(5, -2, 1, 0, Math.PI*2); ctx.fill();

        // Tears
        if (state === 'CRY') {
            ctx.fillStyle = "rgba(100, 149, 237, 0.7)";
            ctx.beginPath(); ctx.ellipse(-5, 5, 1, 4, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(5, 5, 1, 4, 0, 0, Math.PI*2); ctx.fill();
        }
        
        // Mouth (Sad)
        ctx.beginPath(); ctx.arc(0, 6, 3, 0, Math.PI); ctx.stroke();

        ctx.restore(); // End Head

        ctx.restore();
    }

    drawLighting() {
        const ctx = this.ctx;
        const grad = ctx.createRadialGradient(480, 270, 100, 480, 270, 600);
        grad.addColorStop(0, "rgba(0,0,0,0)");
        grad.addColorStop(1, "rgba(0,0,0,0.8)");
        
        let darkness = this.ambience.darkness;
        if (this.scene === 'APARTMENT_FIRE') darkness = 0.4;
        if (this.scene === 'HALLWAY_DARK') darkness = 0.8;

        ctx.fillStyle = `rgba(0,0,0,${darkness})`;
        ctx.fillRect(0, 0, this.width, this.height);

        this.particles.forEach(p => {
            ctx.globalAlpha = p.life;
            if (p.type === 'FIRE') {
                ctx.fillStyle = `rgba(255, ${Math.random()*100 + 50}, 0, ${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 5 + Math.random()*5, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1;
        });

        if (this.ambience.fire > 0) {
            ctx.globalCompositeOperation = 'overlay';
            ctx.fillStyle = `rgba(255, 50, 0, ${this.ambience.fire * 0.3})`;
            ctx.fillRect(0, 0, this.width, this.height);
            ctx.globalCompositeOperation = 'source-over';
        }
    }
}

// Start
window.onload = () => {
    new CinematicGame();
};
</script>
