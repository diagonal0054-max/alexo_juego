<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexo v6 - Retro Story</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap');

        :root {
            /* Paleta Retro-Futurista cálida */
            --primary: #FFB74D; /* Naranja suave */
            --secondary: #00BCD4; /* Cyan retro */
            --ui-bg: rgba(20, 10, 5, 0.9); /* Marrón muy oscuro */
            --text-main: #FFF8E1; /* Crema */
        }

        body {
            background-color: #1a1005;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            color: var(--text-main);
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 960px; 
            height: 540px;
            box-shadow: 0 0 50px rgba(255, 183, 77, 0.2);
            background: #000;
            overflow: hidden;
            cursor: pointer;
            border-top: 40px solid #1a1005;
            border-bottom: 40px solid #1a1005;
            box-sizing: content-box; 
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Layer - ARREGLO CRÍTICO */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 40px;
            box-sizing: border-box;
            z-index: 60;
        }

        #dialog-box {
            background: var(--ui-bg);
            border-top: 2px solid var(--primary);
            padding: 20px 30px;
            min-height: 110px;
            margin: 0 40px 20px 40px;
            
            /* FIX: Siempre visible, controlamos opacidad con JS/CSS */
            display: block; 
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            
            position: relative;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            backdrop-filter: blur(5px);
        }

        #dialog-box.visible {
            opacity: 1;
        }

        #speaker-name {
            font-family: 'Orbitron', sans-serif;
            color: var(--secondary);
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px var(--secondary);
        }

        #dialog-text {
            font-size: 18px;
            line-height: 1.5;
            color: #fff;
        }

        .next-indicator {
            position: absolute;
            bottom: 10px;
            right: 20px;
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            animation: pulse 2s infinite;
            opacity: 0;
        }
        #dialog-box.waiting .next-indicator {
            opacity: 1;
        }

        /* Title Screen */
        #title-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: auto;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 60px;
            color: var(--primary);
            text-shadow: 0 0 30px var(--primary);
            margin: 0;
            letter-spacing: 4px;
        }

        .btn-start {
            margin-top: 40px;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-start:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }

        /* Effects */
        .film-grain {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 50; opacity: 0.3;
        }

        .letterbox {
            position: absolute; left: 0; width: 100%; height: 40px;
            background: #000; z-index: 40; pointer-events: none;
        }
        .lb-top { top: 0; } .lb-bottom { bottom: 0; }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <main id="game-container">
        <canvas id="g" width="960" height="540"></canvas>
        <div class="film-grain"></div>
        <div class="letterbox lb-top"></div><div class="letterbox lb-bottom"></div>

        <div id="title-screen">
            <h1>ALEXO</h1>
            <p style="color: #FFB74D; margin-top: 10px; font-size: 14px; letter-spacing: 2px;">RETRO PROTOCOL</p>
            <button class="btn-start" id="start-btn">INICIAR HISTORIA</button>
        </div>

        <div id="ui-layer">
            <div id="dialog-box">
                <div id="speaker-name"></div>
                <div id="dialog-text"></div>
                <div class="next-indicator">▼ AVANZAR</div>
            </div>
        </div>
    </main>

<script>
/**
 * ALEXO V6: RETRO STORY (Based on User Image)
 * Fixes: Ian Eyes (Explicit Draw), Dialogs (CSS Opacity).
 * Story: Peaceful day, Restaurant, Window view.
 */
class CinematicGame {
    constructor() {
        this.canvas = document.getElementById('g');
        this.ctx = this.canvas.getContext('2d');
        this.width = this.canvas.width;
        this.height = this.canvas.height;
        this.floorY = 380;

        // Camera System
        this.camera = { x: 480, y: 270, targetX: 480, targetY: 270, shake: 0 };

        // UI Elements
        this.uiTitle = document.getElementById('title-screen');
        this.uiDialog = document.getElementById('dialog-box');
        this.elSpeaker = document.getElementById('speaker-name');
        this.elText = document.getElementById('dialog-text');

        // State
        this.state = 'TITLE'; 
        this.stepIndex = 0;
        this.waitingForInput = false;
        
        // Fade System
        this.fade = { opacity: 1, state: 'NONE', speed: 0.02 };

        // Entities
        this.alexo = { x: 480, y: this.floorY, state: 'IDLE', facing: 1, frame: 0, animState: 'WORK' };
        this.kid = { x: 0, y: 0, visible: false, state: 'HIDING', owner: 'NONE' }; 
        this.ian = { x: 900, y: this.floorY, visible: false, state: 'IDLE', holdingTray: true, holdingPaper: false };
        this.rescuers = []; 

        // Environment
        this.ambience = { fire: 0, smoke: 0, darkness: 0, infrared: false, fog: 0, perceptionGlitch: false, sunlight: 0 };
        this.particles = []; // Now used for dust/sunlight
        this.time = 0;
        
        // Birds & Environment Props
        this.seagulls = [];
        for(let i=0; i<5; i++) {
            this.seagulls.push({ x: Math.random()*960, y: Math.random()*200, vx: 1+Math.random(), vy: Math.random()*0.2 });
        }
        // Static water lines
        this.waterLines = [];
        for(let i=0; i<20; i++) {
            this.waterLines.push({ x: Math.random()*960, y: Math.random() * 400 + this.floorY });
        }

        // Script (New Retro Story based on image)
        this.script = this.getDirectorScript();

        // Init
        document.getElementById('start-btn').addEventListener('click', () => this.start());
        document.getElementById('game-container').addEventListener('click', () => this.handleInput());
        
        this.loop = this.loop.bind(this);
    }

    start() {
        this.uiTitle.style.display = 'none';
        this.state = 'PLAYING';
        this.fade.state = 'IN';
        this.runStep();
        requestAnimationFrame(this.loop);
    }

    getDirectorScript() {
        return [
            // ACT 1: PIER/WALK (Image Top Left)
            { type: 'FADE_IN' },
            { type: 'SCENE', bg: 'PIER_SUNNY', cam: { x: 480, y: 300 }, action: () => { 
                this.alexo.x = 100; this.alexo.state = 'WALK'; 
                this.kid.visible = true; this.kid.x = 50; this.kid.owner = 'ALEXO'; // Kid following
            }},
            { type: 'MOVE', actor: 'ALEXO', x: 600, speed: 1.5 },
            { type: 'CAMERA_MOVE', x: 600, y: 320, speed: 0.02 },
            { type: 'DIALOG', text: "El sol hoy se siente diferente. Más cálido.", speaker: "ALEXO" },
            { type: 'WAIT', frames: 60 },
            { type: 'FADE_OUT' },

            // ACT 2: RESTAURANT (Image Top Right)
            { type: 'SCENE', bg: 'SALON_RETRO', cam: { x: 480, y: 300 }, action: () => { 
                this.alexo.x = 300; this.alexo.state = 'IDLE'; 
                this.kid.visible = false; 
                this.ian.visible = true; this.ian.x = 700; this.ian.holdingTray = true; 
            }},
            { type: 'FADE_IN' },
            { type: 'WAIT', frames: 60 }, // Apreciar el ambiente
            { type: 'DIALOG', text: "Bienvenido de nuevo, Alexo. ¿La mesa habitual?", speaker: "IAN" },
            { type: 'MOVE', actor: 'IAN', x: 500, speed: 2 }, // Ian se acerca
            { type: 'CAMERA_MOVE', x: 400, y: 320, speed: 0.02 },
            { type: 'DIALOG', text: "Por favor. Y el menú del día.", speaker: "ALEXO" },
            { type: 'ANIMATION', actor: 'IAN_WRITE' }, // Ian toma nota
            { type: 'WAIT', frames: 40 },
            { type: 'FADE_OUT' },

            // ACT 3: WINDOW VIEW (Image Bottom Left)
            { type: 'SCENE', bg: 'WINDOW_CITY', cam: { x: 700, y: 250 }, action: () => { 
                this.ian.visible = false; 
            }},
            { type: 'FADE_IN' },
            { type: 'WAIT', frames: 120 }, // Larga contemplación
            { type: 'DIALOG', text: "Desde aquí se ve la antigua ciudad fundándose.", speaker: "" },
            { type: 'CAMERA_MOVE', x: 900, y: 280, speed: 0.005 },
            { type: 'WAIT', frames: 80 },
            { type: 'FADE_OUT' },

            // ACT 4: CONVERSATION (Image Bottom Right)
            { type: 'SCENE', bg: 'SALON_RETRO', cam: { x: 480, y: 300 }, action: () => { 
                this.ian.visible = true; this.ian.x = 550; this.ian.holdingPaper = true;
                this.alexo.x = 350;
            }},
            { type: 'FADE_IN' },
            { type: 'DIALOG', text: "Aquí tienes tu orden. Un circuito integrado y café.", speaker: "IAN" },
            { type: 'MOVE', actor: 'IAN', x: 450, speed: 1.5 },
            { type: 'CAMERA_MOVE', x: 480, y: 300, speed: 0.02 },
            { type: 'DIALOG', text: "Gracias, Ian. A veces me pregunto si hay algo más allá del código.", speaker: "ALEXO" },
            { type: 'DIALOG', text: "Quizás. Pero hoy, disfrutemos el café.", speaker: "IAN" },
            { type: 'WAIT', frames: 120 },
            { type: 'FADE_TO_BLACK' },
            { type: 'END' }
        ];
    }

    runStep() {
        if (this.stepIndex >= this.script.length) return;
        const step = this.script[this.stepIndex];
        
        // Wait for fades
        if (step.type !== 'FADE_OUT' && step.type !== 'FADE_IN' && this.fade.state !== 'NONE') {
            requestAnimationFrame(() => this.runStep());
            return;
        }

        switch(step.type) {
            case 'SCENE':
                this.scene = step.bg;
                this.camera.targetX = step.cam.x;
                this.camera.targetY = step.cam.y;
                if (step.action) step.action();
                this.nextStep(); 
                break;
            case 'CAMERA_MOVE':
                this.camera.targetX = step.x;
                this.camera.targetY = step.y;
                this.nextStep();
                break;
            case 'FADE_OUT':
                this.fade.state = 'OUT';
                this.fade.callback = () => this.nextStep();
                break;
            case 'FADE_IN':
                this.fade.state = 'IN';
                this.fade.callback = () => this.nextStep();
                break;
            case 'DIALOG':
                // FIX: Opacidad only. Display is always block.
                this.elSpeaker.innerText = step.speaker || "";
                this.elText.innerText = step.text;
                this.uiDialog.classList.add('visible');
                this.waitingForInput = true;
                this.uiDialog.classList.add('waiting');
                break;
            case 'MOVE':
                this.handleMovement(step);
                break;
            case 'WAIT':
                setTimeout(() => this.nextStep(), (step.frames / 60) * 1000);
                break;
            case 'ANIMATION':
                if (step.anim === 'IAN_WRITE') { this.ian.holdingPaper = true; this.ian.holdingTray = false; }
                if (step.anim === 'HUG') { this.alexo.state = 'IDLE'; this.kid.x = this.alexo.x; this.kid.owner = 'ALEXO'; }
                if (step.anim === 'RESCUER_ARMS') { if(this.rescuers[0]) this.rescuers[0].armsUp = true; }
                if (step.anim === 'EXIT') { this.alexo.facing = -1; this.alexo.state = 'WALK'; }
                this.nextStep();
                break;
            case 'TRANSFER_KID':
                this.kid.owner = 'FIGHTER'; 
                this.alexo.state = 'IDLE'; 
                this.nextStep();
                break;
            case 'EFFECT':
                if (step.name === 'PERCEPTION_START') this.ambience.perceptionGlitch = true;
                if (step.name === 'PERCEPTION_END') this.ambience.perceptionGlitch = false;
                if (step.name === 'SIREN') this.triggerSiren();
                if (step.name === 'SHAKE') this.camera.shake = 20;
                this.nextStep();
                break;
            case 'SPAWN_RESCUERS':
                this.rescuers = [{ x: 900, y: 500, armsUp: false }, { x: 950, y: 510, armsUp: false }];
                this.nextStep();
                break;
            case 'MOVE_RESCUERS':
                this.handleRescuerMove(step.x, step.y, step.speed, () => this.nextStep());
                break;
            case 'FADE_TO_BLACK':
                this.fade.state = 'OUT_FINAL';
                break;
            case 'END':
                this.state = 'END';
                this.elText.innerText = "FIN DE LA TRANSMISIÓN";
                this.elSpeaker.innerText = "";
                break;
        }
    }

    handleMovement(step) {
        const actor = step.actor === 'ALEXO' ? this.alexo : this.ian;
        const target = step.x; 
        const animateMove = () => {
            const dx = target - actor.x;
            const dy = (step.y !== undefined ? step.y : actor.y) - actor.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < step.speed) {
                actor.x = target; actor.y = step.y !== undefined ? step.y : actor.y; this.nextStep();
            } else {
                actor.x += (dx/dist) * step.speed; actor.y += (dy/dist) * step.speed;
                requestAnimationFrame(animateMove);
            }
        };
        animateMove();
    }

    handleRescuerMove(targetX, targetY, speed, callback) {
        let allArrived = true;
        this.rescuers.forEach(actor => {
            const dx = targetX - actor.x;
            const dy = targetY - actor.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > speed) {
                actor.x += (dx/dist) * speed; actor.y += (dy/dist) * speed;
                allArrived = false;
            } else {
                actor.x = targetX; actor.y = targetY;
            }
        });
        if (!allArrived) requestAnimationFrame(() => this.handleRescuerMove(targetX, targetY, speed, callback));
        else callback();
    }

    handleInput() {
        if (this.state === 'END') { location.reload(); return; }
        if (this.waitingForInput) {
            this.waitingForInput = false;
            this.uiDialog.classList.remove('waiting');
            this.uiDialog.classList.remove('visible');
            
            setTimeout(() => {
                this.stepIndex++;
                this.runStep();
            }, 800); 
        }
    }

    nextStep() {
        this.stepIndex++;
        this.runStep();
    }

    triggerSiren() {
        let count = 0;
        const flash = () => {
            if(count > 6) return;
            this.ctx.fillStyle = count % 2 === 0 ? "rgba(255,0,0,0.2)" : "rgba(0,0,255,0.2)";
            this.ctx.fillRect(0,0,this.width, this.height);
            count++;
            setTimeout(flash, 150);
        }
        flash();
    }

    loop() {
        this.time++;
        this.update();
        this.draw();
        if(this.state !== 'STOPPED') requestAnimationFrame(this.loop);
    }

    update() {
        this.camera.x += (this.camera.targetX - this.camera.x) * 0.05;
        this.camera.y += (this.camera.targetY - this.camera.y) * 0.05;
        if (this.camera.shake > 0) this.camera.shake *= 0.9;
        
        if (this.fade.state === 'OUT') {
            this.fade.opacity += this.fade.speed;
            if (this.fade.opacity >= 1) {
                this.fade.opacity = 1;
                this.fade.state = 'NONE';
                if(this.fade.callback) { this.fade.callback(); this.fade.callback = null; }
            }
        } else if (this.fade.state === 'IN') {
            this.fade.opacity -= this.fade.speed;
            if (this.fade.opacity <= 0) {
                this.fade.opacity = 0;
                this.fade.state = 'NONE';
                if(this.fade.callback) { this.fade.callback(); this.fade.callback = null; }
            }
        } else if (this.fade.state === 'OUT_FINAL') {
            this.fade.opacity += 0.01;
        }

        this.alexo.frame = Math.sin(this.time * 0.15) * 0.5;
        
        this.seagulls.forEach(s => {
            s.x += s.vx;
            s.y += Math.sin(this.time * 0.05) * 0.5;
            if(s.x > 1000) s.x = -50;
        });

        // Sunlight particles (Retro atmosphere)
        if (Math.random() > 0.8) {
            this.particles.push({ x: Math.random() * this.width, y: -20, vx: (Math.random()-0.5)*1, vy: Math.random()*1+0.5, life: 1.0, type: 'DUST' });
        }
        for (let i = this.particles.length - 1; i >= 0; i--) {
            let p = this.particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.005;
            if (p.life <= 0) this.particles.splice(i, 1);
        }
    }

    draw() {
        // Clear
        this.ctx.fillStyle = "#1a1005"; // Warm background
        this.ctx.fillRect(0, 0, this.width, this.height);

        this.ctx.save();
        const shakeX = (Math.random() - 0.5) * this.camera.shake;
        const shakeY = (Math.random() - 0.5) * this.camera.shake;
        this.ctx.translate(this.width/2 - this.camera.x + shakeX, this.height/2 - this.camera.y + shakeY);

        if (this.scene === 'SALON_RETRO') this.drawSalonRetro();
        else if (this.scene === 'PIER_SUNNY') this.drawPier();
        else if (this.scene === 'WINDOW_CITY') this.drawWindowCity();
        else if (this.scene === 'STREET') this.drawStreet();
        else if (this.scene === 'HALL_DARK') this.drawHall(true);
        else if (this.scene === 'APARTMENT') this.drawApartment();
        else if (this.scene === 'STAIRS') this.drawStairs();
        else if (this.scene === 'HALL_LIGHT') this.drawHall(false);
        else if (this.scene === 'EXIT_DOOR') this.drawExitDoor();

        if (this.alexo.visible !== false) this.drawAlexoPro(this.alexo.x, this.alexo.y, this.alexo.state, this.alexo.animState);
        if (this.ian.visible) this.drawIanPro(this.ian.x, this.ian.y, this.ian.holdingTray, this.ian.holdingPaper);
        
        if (this.kid.visible) {
            let kx = this.kid.x;
            let ky = this.kid.y;
            if (this.kid.owner === 'ALEXO') {
                kx = this.alexo.x;
                ky = this.alexo.y; 
            } else if (this.kid.owner === 'FIGHTER' && this.rescuers.length > 0) {
                kx = this.rescuers[0].x;
                ky = this.rescuers[0].y;
            }
            this.drawKidPro(kx, ky, this.kid.state);
        }

        if (this.rescuers.length > 0) this.rescuers.forEach(r => this.drawRescuerPro(r.x, r.y, r.armsUp));

        this.ctx.restore();
        this.drawLighting();
        this.drawFade();
    }

    drawFade() {
        if (this.fade.opacity > 0) {
            this.ctx.fillStyle = `rgba(0,0,0,${this.fade.opacity})`;
            this.ctx.fillRect(0, 0, this.width, this.height);
        }
    }

    // === NEW SCENES FOR RETRO STORY ===

    drawPier() {
        const ctx = this.ctx;
        // Sky (Blue Retro)
        const skyGrad = ctx.createLinearGradient(0, 0, 0, this.floorY);
        skyGrad.addColorStop(0, "#4FC3F7"); skyGrad.addColorStop(1, "#FFF9C4");
        ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, 960, this.floorY);

        // Water (Blue calm)
        ctx.fillStyle = "#0288D1"; ctx.fillRect(0, this.floorY, 960, 500);
        // Reflections
        ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth=2;
        for(let i=0; i<this.waterLines.length; i++) {
            const line = this.waterLines[i];
            ctx.beginPath(); ctx.moveTo(line.x, this.floorY); ctx.lineTo(line.x, line.y + 100); ctx.stroke();
        }

        // Wooden Floor
        ctx.fillStyle = "#8D6E63";
        ctx.fillRect(-200, this.floorY - 20, 2000, 40);
        // Planks
        ctx.strokeStyle = "#5D4037"; ctx.lineWidth=2;
        for(let i=0; i<10; i++) {
            ctx.beginPath(); ctx.moveTo(-200, this.floorY - 20 + i*4); ctx.lineTo(2000, this.floorY - 20 + i*4); ctx.stroke();
        }

        // Lamp posts
        for(let i=0; i<3; i++) {
            let lx = 200 + i*300;
            ctx.fillStyle = "#333"; ctx.fillRect(lx, this.floorY - 150, 10, 150);
            ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.arc(lx+5, this.floorY - 150, 15, 0, Math.PI*2); ctx.fill();
        }
    }

    drawWindowCity() {
        const ctx = this.ctx;
        // Sky
        const skyGrad = ctx.createLinearGradient(0, 0, 0, this.floorY);
        skyGrad.addColorStop(0, "#1A237E"); skyGrad.addColorStop(1, "#FF7043");
        ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, 960, this.floorY);

        // City Silhouette (Modern/Futuristic)
        ctx.fillStyle = "#101010";
        for(let i=0; i<15; i++) {
            let h = 100 + Math.sin(i)*100;
            ctx.fillRect(i * 150 - 500, this.floorY - h, 120, h + 500);
            // Windows
            ctx.fillStyle = "#FFEB3B"; 
            if (i % 2 === 0) ctx.fillRect(i * 150 - 480, this.floorY - h + 20, 20, 20);
            ctx.fillStyle = "#101010";
        }

        // Window Frame
        ctx.strokeStyle = "#555"; ctx.lineWidth = 15;
        ctx.strokeRect(600, 50, 300, 300);
    }

    drawSalonRetro() {
        const ctx = this.ctx;
        // Floor (Retro tiles)
        ctx.fillStyle = "#4E342E"; ctx.fillRect(0, 0, 960, this.height - this.floorY);
        ctx.fillStyle = "#8D6E63"; ctx.fillRect(0, 0, 960, this.floorY);
        
        // Checkered floor pattern
        ctx.fillStyle = "rgba(0,0,0,0.1)";
        for(let i=0; i<10; i++) {
            for(let j=0; j<5; j++) {
                if((i+j)%2===0) ctx.fillRect(i*100, this.floorY-20, 100, 20);
            }
        }

        // Windows looking outside (Bright)
        ctx.fillStyle = "#B3E5FC"; ctx.fillRect(100, 50, 200, 150);
        ctx.strokeStyle = "#555"; ctx.strokeRect(100, 50, 200, 150);

        // Hanging Lamps
        ctx.fillStyle = "#FFB74D";
        for(let i=0; i<3; i++) {
            const cx = 300 + i*220;
            ctx.globalAlpha = 0.4 + Math.sin(this.time * 0.05 + i)*0.1;
            ctx.beginPath(); ctx.arc(cx, 50, 30, 0, Math.PI*2); ctx.fill();
            ctx.shadowColor = "#FFB74D"; ctx.shadowBlur = 40;
            ctx.beginPath(); ctx.arc(cx, 50, 10, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        }
        ctx.globalAlpha = 1;
    }

    // === OLD SCENES (Fallback) ===
    drawStreet() { 
        this.ctx.fillStyle = "#111"; this.ctx.fillRect(0, 0, 960, 540);
        const fireWorldX = 2000;
        this.ctx.shadowBlur = 100; this.ctx.shadowColor = "red";
        this.ctx.fillStyle = "rgba(255, 50, 0, 0.2)"; this.ctx.fillRect(fireWorldX - 200, 0, 400, 600);
        this.ctx.shadowBlur = 0;
    }
    drawHall(isDark) {
        this.ctx.fillStyle = "#0a0a0a"; this.ctx.fillRect(0, 0, 960, 540);
        this.ctx.fillStyle = "#151515"; this.ctx.fillRect(0, -200, 960, 600); 
        this.ctx.strokeStyle = "#333"; this.ctx.beginPath();
        this.ctx.moveTo(-400, 400); this.ctx.lineTo(400, 100);
        this.ctx.moveTo(1400, 400); this.ctx.lineTo(600, 100); this.ctx.stroke();
        if (isDark) {
            this.ctx.shadowBlur = 80; this.ctx.shadowColor = "red";
            this.ctx.fillStyle = "rgba(255, 0, 0, 0.3)";
            this.ctx.beginPath(); this.ctx.arc(480, 100, 50, 0, Math.PI*2); ctx.fill();
            this.ctx.shadowBlur = 0;
        }
    }
    drawApartment() {
        this.ctx.fillStyle = "#2a1005"; this.ctx.fillRect(0, 0, 960, 540);
        this.ctx.shadowBlur = 60; this.ctx.shadowColor = "orange";
        this.ctx.fillStyle = "#ff4400"; this.ctx.fillRect(600, 50, 200, 200);
        this.ctx.shadowBlur = 0;
        this.ctx.fillStyle = "#1a0a00";
        this.ctx.fillRect(100, 350, 150, 80); 
        this.ctx.fillStyle = "rgba(0,0,0,0.5)"; this.ctx.fillRect(0, 0, 960, 540);
    }
    drawStairs() {
        this.ctx.fillStyle = "#111"; this.ctx.fillRect(0, 0, 960, 540);
        this.ctx.strokeStyle = "#222"; this.ctx.lineWidth = 4;
        for(let i=0; i<10; i++) {
            let y = 50 + i * 50;
            this.ctx.beginPath(); this.ctx.moveTo(300, y); ctx.lineTo(660, y); ctx.stroke();
        }
        this.ctx.strokeStyle = "#444"; ctx.beginPath();
        this.ctx.moveTo(310, 50); ctx.lineTo(310, 550);
        this.ctx.moveTo(650, 50); ctx.lineTo(650, 550); ctx.stroke();
    }
    drawExitDoor() {
        this.ctx.fillStyle = "#080808"; this.ctx.fillRect(0, 0, 960, 540);
        this.ctx.fillStyle = "#222"; this.ctx.fillRect(400, 150, 160, 300);
        this.ctx.strokeStyle = "#444"; this.ctx.strokeRect(400, 150, 160, 300);
        this.ctx.shadowBlur = 50; this.ctx.shadowColor = "#00FF88";
        this.ctx.fillStyle = "rgba(0, 255, 136, 0.1)";
        this.ctx.fillRect(410, 160, 140, 280); this.ctx.shadowBlur = 0;
    }

    // === CHARACTERS (FIXED & RETRO) ===

    drawAlexoPro(x, y, state, animState) {
        const ctx = this.ctx; ctx.save(); ctx.translate(x, y);
        let workLean = 0;
        if (animState === 'WORK') workLean = Math.sin(this.time * 0.05) * 0.2;

        if (state === 'RUN') ctx.rotate(0.2);
        const bob = Math.sin(this.time * (state==='RUN'?0.3:0.1)) * (state === 'RUN' ? 5 : 2);
        
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.beginPath(); ctx.ellipse(0, 45, 35, 12, 0, 0, Math.PI*2); ctx.fill();

        const legSwing = Math.sin(this.time * (state==='RUN'?0.3:0.05)) * (state === 'RUN' ? 25 : 5);
        const drawLeg = (side, swing) => {
            ctx.save(); ctx.translate(side*12, 40 + bob); ctx.rotate(swing*side*0.02);
            ctx.fillStyle = "#555"; ctx.fillRect(-6, -20, 12, 25);
            ctx.beginPath(); ctx.arc(0, 5, 6, 0, Math.PI*2); ctx.fill();
            ctx.save(); ctx.rotate(swing*side*0.04);
            ctx.fillStyle = "#444"; ctx.fillRect(-5, 5, 10, 25);
            ctx.fillStyle = "#333"; ctx.fillRect(-7, 28, 14, 8);
            ctx.restore(); ctx.restore();
        };
        drawLeg(-1, legSwing); drawLeg(1, -legSwing);

        ctx.save(); ctx.rotate(workLean);
        ctx.fillStyle = "#666";
        ctx.beginPath(); ctx.moveTo(-22, -40 + bob); ctx.lineTo(22, -40 + bob); 
        ctx.lineTo(18, 40 + bob); ctx.lineTo(-18, 40 + bob); ctx.closePath(); ctx.fill();
        
        const corePulse = 0.5 + Math.sin(this.time * 0.1) * 0.5;
        ctx.shadowColor = "#00FF88"; ctx.shadowBlur = 10;
        ctx.fillStyle = `rgba(0, 255, 136, ${corePulse})`;
        ctx.beginPath(); ctx.arc(0, 0 + bob, 8, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#444"; ctx.fillRect(-15, 40 + bob, 30, 10);
        ctx.restore();

        ctx.save(); ctx.translate(0, -50 + bob);
        ctx.fillStyle = "#777";
        ctx.beginPath(); ctx.arc(0, 0, 22, Math.PI, 0); ctx.lineTo(22, 15); ctx.lineTo(-22, 15); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#00FF88"; ctx.shadowColor="#00FF88"; ctx.shadowBlur=8;
        ctx.fillRect(-18, -5, 36, 8); ctx.shadowBlur=0;
        ctx.strokeStyle="#555"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(0,-35); ctx.stroke();
        ctx.fillStyle="red"; ctx.beginPath(); ctx.arc(0,-35, 2, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        const armSwing = Math.sin(this.time * (state==='RUN'?0.3:0.1)) * (state === 'RUN' ? 30 : 5);
        const drawArm = (side, swing) => {
            ctx.save(); ctx.translate(side*22, -30 + bob); ctx.rotate(swing*side*0.02);
            ctx.fillStyle = "#555"; ctx.fillRect(-5, 0, 10, 25);
            ctx.fillStyle = "#333"; ctx.fillRect(-4, 22, 8, 15);
            ctx.fillStyle = "#222"; ctx.beginPath(); ctx.arc(0, 38, 5, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        };
        drawArm(-1, armSwing); drawArm(1, -armSwing);

        ctx.restore();
    }

    drawIanPro(x, y, hasTray, hasPaper) {
        const ctx = this.ctx; ctx.save(); ctx.translate(x, y);
        const bob = Math.sin(this.time * 0.1) * 2;
        
        // Shadow
        ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.beginPath(); ctx.ellipse(0, 5, 25, 8, 0, 0, Math.PI*2); ctx.fill();
        
        // Legs
        const legSwing = Math.sin(this.time * 0.1) * 5;
        ctx.strokeStyle = "#0a0a0a"; ctx.lineWidth = 8; ctx.lineCap="round";
        ctx.beginPath(); ctx.moveTo(-8, 0+bob); ctx.lineTo(-8-legSwing, 35+bob); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(8, 0+bob); ctx.lineTo(8+legSwing, 35+bob); ctx.stroke();
        
        // Body
        ctx.fillStyle = "#111"; ctx.beginPath(); ctx.moveTo(-16, -55 + bob); ctx.lineTo(16, -55 + bob); ctx.lineTo(12, 0 + bob); ctx.lineTo(-12, 0 + bob); ctx.fill();
        ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.moveTo(0,-55+bob); ctx.lineTo(8,-50+bob); ctx.lineTo(0,-40+bob); ctx.lineTo(-8,-50+bob); ctx.fill();
        ctx.fillStyle = "#111"; ctx.fillRect(-5, -45+bob, 10, 4); 
        
        // Arms
        ctx.strokeStyle = "#111"; ctx.lineWidth = 7;
        ctx.beginPath(); ctx.moveTo(-16, -50+bob); ctx.lineTo(-18, 0+bob); ctx.stroke(); 
        ctx.beginPath(); 
        if (hasPaper) { ctx.moveTo(16, -50+bob); ctx.lineTo(30, -40+bob); } 
        else { ctx.moveTo(16, -50+bob); ctx.lineTo(20, -15+bob); } ctx.stroke();
        
        // Tray/Paper
        if (hasTray && !hasPaper) {
            ctx.save(); ctx.translate(35, -5+bob); ctx.fillStyle = "#AAA"; ctx.beginPath(); ctx.ellipse(0, 0, 25, 8, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.moveTo(-5, -5); ctx.lineTo(-3, -20); ctx.lineTo(3, -20); ctx.lineTo(5, -5); ctx.fill();
            ctx.fillStyle = "#800"; ctx.fillRect(-3, -15, 6, 8); ctx.restore();
        }
        if (hasPaper) {
            ctx.save(); ctx.translate(35, -50+bob); ctx.rotate(-0.3); ctx.fillStyle = "#EEE"; ctx.fillRect(0, 0, 30, 40); ctx.fillStyle = "#000"; ctx.font="8px monospace"; ctx.fillText("...", 2, 10); ctx.restore();
        }

        // HEAD & FACE (FIXED EXPLICIT EYES)
        ctx.save(); ctx.translate(0, -65 + bob);
        
        // Head Shape
        ctx.fillStyle = "#dcb"; ctx.beginPath(); ctx.ellipse(0, 0, 12, 15, 0, 0, Math.PI*2); ctx.fill();
        // Hair
        ctx.fillStyle = "#111"; ctx.beginPath(); ctx.arc(0, -12, 12, Math.PI, 0); ctx.fill();
        
        // FIX: EYES (Drawing them separately to ensure visibility)
        // Right Eye (closer)
        ctx.fillStyle = "#FFF"; 
        ctx.beginPath(); ctx.ellipse(2, -3, 3, 4, 0, 0, Math.PI*2); ctx.fill();
        // Left Eye (farther)
        ctx.beginPath(); ctx.ellipse(6, -4, 1.5, 2, 0, 0, Math.PI*2); ctx.fill();

        // Pupils
        ctx.fillStyle = "#000"; 
        ctx.beginPath(); ctx.arc(3, -3, 1, 0, Math.PI*2); ctx.fill(); 
        ctx.beginPath(); ctx.arc(6.5, -4, 0.5, 0, Math.PI*2); ctx.fill();
        
        ctx.restore(); 
        ctx.restore();
    }

    drawKidPro(x, y, state) {
        const ctx = this.ctx; ctx.save(); ctx.translate(x, y);
        const shake = state === 'CRY' ? (Math.random()-0.5)*3 : 0;
        ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.ellipse(0, 10, 10, 4, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#d32f2f"; ctx.fillRect(-12+shake, -30, 24, 30);
        ctx.fillStyle = "#d32f2f"; ctx.beginPath(); ctx.ellipse(-14+shake, -15, 5, 8, 0.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(14+shake, -15, 5, 8, -0.5, 0, Math.PI*2); ctx.fill();
        ctx.save(); ctx.translate(0+shake, -42);
        ctx.fillStyle = "#e0ac69"; ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#3e2723"; ctx.beginPath(); ctx.arc(0, -10, 14, Math.PI, 0); ctx.fill();
        ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.ellipse(-5, -2, 3, 4, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(5, -2, 3, 4, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(-5, -2, 1, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(5, -2, 1, 0, Math.PI*2); ctx.fill();
        if (state === 'CRY') {
            ctx.fillStyle = "rgba(100, 149, 237, 0.7)"; ctx.beginPath(); ctx.ellipse(-5, 5, 1, 4, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(5, 5, 1, 4, 0, 0, Math.PI*2); ctx.fill();
        } ctx.beginPath(); ctx.arc(0, 6, 3, 0, Math.PI); ctx.stroke(); ctx.restore(); ctx.restore();
    }

    drawRescuerPro(x, y, armsUp) {
        const ctx = this.ctx; ctx.save(); ctx.translate(x, y);
        ctx.fillStyle = "#FFD700"; 
        ctx.fillRect(-15, -55, 30, 65);
        ctx.fillStyle = "#FFD700"; ctx.beginPath(); ctx.arc(0, -65, 14, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#333"; ctx.fillRect(-12, -68, 24, 6);
        ctx.fillStyle = "#FFD700";
        if (armsUp) {
            ctx.save(); ctx.translate(-15, -50); ctx.rotate(-0.5); ctx.fillRect(-5, 0, 10, 30); ctx.restore();
            ctx.save(); ctx.translate(15, -50); ctx.rotate(0.5); ctx.fillRect(-5, 0, 10, 30); ctx.restore();
        } else {
            ctx.fillRect(-20, -50, 8, 30); ctx.fillRect(12, -50, 8, 30);
        }
        ctx.restore();
    }

    drawLighting() {
        const ctx = this.ctx;
        // Warm Overlay for retro feel
        if (this.scene === 'SALON_RETRO' || this.scene === 'PIER_SUNNY') {
            ctx.globalCompositeOperation = 'overlay';
            ctx.fillStyle = "rgba(255, 183, 77, 0.2)";
            ctx.fillRect(0, 0, this.width, this.height);
            ctx.globalCompositeOperation = 'source-over';
        }

        // Dust particles
        this.particles.forEach(p => {
            ctx.globalAlpha = p.life;
            if (p.type === 'DUST') {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.life * 0.5})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 1 + Math.random(), 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1;
        });
    }
}

window.onload = () => { new CinematicGame(); };
</script>
