function rr(x,y,w,h,r){r=Math.min(r,Math.min(w,h)/2);cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);cx.lineTo(x+r,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-r);cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);cx.closePath()}
function wt(t,x,y,mw,lh){var w=t.split(' '),ln='',ly=y;for(var i=0;i<w.length;i++){var s=ln+w[i]+' ';if(cx.measureText(s).width>mw&&ln!==''){cx.fillText(ln.trim(),x,ly);ln=w[i]+' ';ly+=lh}else ln=s}cx.fillText(ln.trim(),x,ly)}

var yts=[{x:150,w:60},{x:400,w:48},{x:650,w:70},{x:850,w:42}];
for(var y=0;y<yts.length;y++){var yt=yts[y],bob=Math.sin(now*.001+y*2)*2,yb=295+y*12+bob;cx.fillStyle='#E0E0E0';cx.beginPath();cx.moveTo(yt.x,yb);cx.lineTo(yt.x+yt.w,yb);cx.lineTo(yt.x+yt.w-4,yb+yt.h);cx.lineTo(yt.x+4,yb+yt.h);cx.closePath();cx.fill();cx.fillStyle='#2A5C8A';cx.fillRect(yt.x+7,yb+2,yt.w-14,2)}
cx.strokeStyle='#8B7355';cx.lineWidth=10;cx.strokeRect(0,0,GW,GH);cx.strokeStyle='#6B5535';cx.lineWidth=4;cx.beginPath();cx.moveTo(GW/2,0);cx.lineTo(GW/2,GH);cx.stroke();cx.beginPath();cx.moveTo(0,GH/2);cx.lineTo(GW,GH/2);cx.stroke();
}

function drawScanScene(prog){
drawWindowScene();
cx.fillStyle='rgba(0,255,136,0.04)';cx.fillRect(0,0,GW,GH);
var now=performance.now(),scanY=(now*.15)%GH;
cx.strokeStyle='rgba(0,255,136,0.25)';cx.lineWidth=1;cx.beginPath();cx.moveTo(0,scanY);cx.lineTo(GW,scanY);cx.stroke();cx.fillStyle='rgba(0,255,136,0.06)';cx.fillRect(0,scanY-2,GW,4);
cx.strokeStyle='rgba(0,255,136,0.03)';cx.lineWidth=.5;for(var i=0;i<GW;i+=55){cx.beginPath();cx.moveTo(i,0);cx.lineTo(i,GH);cx.stroke();for(var j=0;j<GH;j+=55){cx.beginPath();cx.moveTo(0,j);cx.lineTo(GW,j);cx.stroke()}}
for(var k=0;k<3;k++){var r=40+k*70+Math.sin(now*.002+k)*15;cx.strokeStyle='rgba(0,255,136,'+(0.06-k*.015).toFixed(3)+')';cx.lineWidth=1;cx.beginPath();cx.arc(GW*.7,255,r,0,Math.PI*2);cx.stroke()}
cx.fillStyle='rgba(0,255,136,0.7)';cx.font='11px "Orbitron"';cx.textAlign='left';
cx.fillText('ESCANEANDO ARCADIA...',30,30);cx.fillText('RADIO: 2.4 KM',30,48);
if(prog>=1){cx.fillStyle='rgba(255,80,0,0.8)';cx.fillText('ALERTA: INCENDIO DETECTADO',30,68);cx.fillStyle='rgba(255,80,0,0.4)';cx.font='10px "Source Sans 3"';cx.fillText('Torre Residencial - Sector 12',30,84)}
if(prog>=2){cx.fillStyle='rgba(255,50,50,0.8)';cx.font='11px "Orbitron"';cx.fillText('SENAL DE VIDA',30,105);cx.fillStyle='rgba(255,50,50,0.5)';cx.font='10px "Source Sans 3"';cx.fillText('Piso 11 - Patron: infantil - Unico',30,121);cx.strokeStyle='rgba(255,50,50,0.5)';cx.lineWidth=1.5;cx.setLineDash([4,4]);cx.beginPath();cx.moveTo(180,130);cx.lineTo(GW*.7-10,245);cx.stroke();cx.setLineDash([]);var pulse=.5+.5*Math.sin(now*.006);cx.fillStyle='rgba(255,50,50,'+pulse.toFixed(2)+')';cx.beginPath();cx.arc(GW*.7,245,5+pulse*4,0,Math.PI*2);cx.fill();cx.fillStyle='rgba(60,50,40,0.12)';cx.beginPath();cx.arc(GW*.7,255,20+Math.sin(now*.001)*5,0,Math.PI*2);cx.fill();cx.fillStyle='rgba(255,100,0,0.06)';cx.beginPath();cx.arc(GW*.7,245,12,0,Math.PI*2);cx.fill()}
cx.textAlign='left';
}

function drawDepartScene(){
var g=cx.createLinearGradient(0,0,0,GH);g.addColorStop(0,'#050810');g.addColorStop(1,'#0A0E18');cx.fillStyle=g;cx.fillRect(0,0,GW,GH);
var blds=[{x:0,w:80,h:100},{x:85,w:60,h:140},{x:150,w:90,h:110},{x:600,w:60,h:120},{x:665,w:85,h:95},{x:755,w:55,h:135},{x:815,w:65,h:105},{x:885,w:75,h:90}];
for(var i=0;i<blds.length;i++)cx.fillStyle='#0A0C14',cx.fillRect(blds[i].x,440-blds[i].h,blds[i].w,blds[i].h);
cx.fillStyle='#14161E';cx.fillRect(0,440,GW,100);cx.fillStyle='#1A1C26';cx.fillRect(0,435,GW,8);
var th=180,ty=440-th;cx.fillStyle='#1A1C28';cx.fillRect(750,ty,80,th);for(var j=0;j<4;j++){cx.fillStyle='rgba(255,'+(60+j*20)+',0,0.25)';cx.fillRect(758,ty+j*15,64,8)}
var now=performance.now();if(Math.random()<.2)addFlame(790,ty,15);
var fl2=Math.sin(now*.008)>.5;cx.fillStyle=fl2?'rgba(0,0,255,0.015)':'rgba(255,0,0,0.015)';cx.fillRect(0,0,GW,GH);
}

/* === DIALOGO === */
function drawDlg(){
if(!dlgOn)return;
var bx=20,by=GH-125,bw=GW-40,bh=105,spk=phases[ph].spk||'';
cx.fillStyle='rgba(5,8,18,0.88)';rr(bx,by,bw,bh,8);cx.fill();cx.strokeStyle='rgba(0,255,136,0.25)';cx.lineWidth=1;rr(bx,by,bw,bh,8);cx.stroke();
cx.fillStyle='#00FF88';cx.globalAlpha=.4;cx.fillRect(bx+15,by+1,40,2);cx.globalAlpha=1;
var txX=bx+20;if(spk){cx.fillStyle='rgba(0,255,136,0.6)';cx.font='600 13px "Source Sans 3"';cx.textBaseline='top';cx.textAlign='left';cx.fillText(spk+':',txX,by+12);txX+=cx.measureText(spk+': ').width}
cx.fillStyle='#E0E0E0';cx.font='18px "Source Sans 3"';cx.textBaseline='top';cx.textAlign='left';wt(dlgTxt(),txX,by+12,bw-(txX-bx)-20,26);
if(dlgFull){var ba=.3+.7*Math.abs(Math.sin(performance.now()*.003));cx.fillStyle='rgba(0,255,136,'+ba.toFixed(2)+')';cx.font='14px "Source Sans 3"';cx.textAlign='right';cx.fillText('\u25bc continuar',bx+bw-20,by+bh-18);cx.textAlign='left'}
}

function drawEndCard(){
var bx=GW/2-200,by=GH/2-50,bw=400,bh=100;
cx.fillStyle='rgba(5,8,18,0.9)';rr(bx,by,bw,bh,10);cx.fill();cx.strokeStyle='rgba(0,255,136,0.25)';cx.lineWidth=1;rr(bx,by,bw,bh,10);cx.stroke();
cx.fillStyle='#00FF88';cx.font='600 17px "Source Sans 3"';cx.textAlign='center';cx.textBaseline='middle';
cx.fillText('Alexo ya no esta.',GW/2,GH/2-15);
cx.fillStyle='#888';cx.font='300 12px "Source Sans 3"';cx.fillText('La puerta se cierra detras de el.',GW/2,GH/2+5);
var bk=.3+.7*Math.abs(Math.sin(performance.now()*.003));cx.fillStyle='rgba(0,255,136,'+bk.toFixed(2)+')';cx.font='300 14px "Source Sans 3"';cx.fillText('>>> Siguiente escena: El salvataje <<<',GW/2,GH/2+28);
cx.fillStyle='rgba(200,200,220,0.2)';cx.font='300 11px "Source Sans 3"';cx.fillText('clic para ir al menu',GW/2,GH/2+48);
cx.textAlign='left';cx.textBaseline='top';
}

function drawFade(){if(fadeAlpha<=0)return;cx.fillStyle='rgba(5,8,18,'+fadeAlpha.toFixed(3)+')';cx.fillRect(0,0,GW,GH)}

/* === NAV === */
function advPh(){
ph++;pt=0;if(ph>=phases.length){sceneDone=true;return}
var p=phases[ph];walkFrame=0;walkTick=0;axCrouch=false;axCarry=false;
ianVis=false;ianFace='right';quoteMode=false;quoteAlpha=0;
var a=p.act;
if(a==='stand'){axFace='back'}
if(a==='ian_enter'){ianVis=true;ianX=900}
if(a==='ian_talk'){ianVis=true;ianFace='left'}
if(a==='show_nb'){ianVis=true;ianFace='left'}
if(a==='ian_look'){ianVis=true;ianFace='right'}
if(a==='walk_exit'){axFace='back'}
if(a==='ian_call'){ianVis=true;ianFace='right'}
if(a==='walk_away'){axFace='back'}
if(p.spk)dlgStart(p.t);else dlgStart(p.t);
}

cv.addEventListener('click',function(){
if(sceneDone){window.location.href='index.html';return}
if(dlgOn){var done=dlgAdv();if(done)advPh()}
});

dlgStart(phases[0].t);

function tickW(){walkTick++;if(walkTick>=9){walkTick=0;walkFrame=walkFrame===1?2:1}}
function stopW(){walkFrame=0;walkTick=0}

function loop(){
cx.clearRect(0,0,GW,GH);updateParticles();dlgUpd(performance.now());pt++;
if(fadeAlpha>0){fadeAlpha-=.02;if(fadeAlpha<0)fadeAlpha=0}

if(sceneDone){drawDepartScene();drawEndCard();drawParticles();drawFade();requestAnimationFrame(loop);return}

var p=phases[ph],a=p.act,sc=p.s;

/* Actualizar accion */
if(a==='stand'){}
if(a==='ian_enter'){tickW();if(ianX>500)ianX-=2;else stopW()}
if(a==='walk_exit'){tickW();if(axX<900)axX+=2.2;else stopW()}
if(a==='walk_away'){tickW();if(axX<GW+80)axX+=1.5;else stopW()}
if(a==='scan1'){}
if(a==='scan2'){}

/* Dibujar escena */
if(sc==='title'){drawTitleScene()}
else if(sc==='salon'){drawSalonScene();
if(ianVis)drawIan(ianX,FY,walkFrame==='0'?0:walkFrame,a==='show_nb');
if(axFace==='back')drawAxBack(axX,FY,walkFrame);else drawAxFront(axX,FY,walkFrame,axCrouch,axCarry)}
else if(sc==='window'){drawWindowScene();if(axFace==='back')drawAxBack(axX,FY,walkFrame);else drawAxFront(axX,FY,walkFrame,axCrouch,axCarry)}
else if(sc==='notebook'){drawSalonScene();drawIan(350,FY-10,0,true);if(axFace==='back')drawAxBack(axX,FY,walkFrame);else drawAxFront(axX,FY,walkFrame,axCrouch,axCarry)}
else if(sc==='scan'){var sp=0;if(a==='stand')sp=0;if(a==='scan1')sp=1;if(a==='scan2')sp=2;drawScanScene(sp);if(axFace==='back')drawAxBack(axX,FY,walkFrame);else drawAxFront(axX,FY,walkFrame,axCrouch,axCarry)}
else if(sc==='depart'){drawDepartScene();if(axFace==='back')drawAxBack(axX,FY,walkFrame);else drawAxFront(axX,FY,walkFrame,axCrouch,axCarry)}
else if(sc==='end'){drawDepartScene();drawEndCard()}

drawParticles();drawDlg();drawFade();requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
