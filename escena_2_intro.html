var particles=[];
function updP(){for(var i=0;i<particles.length-1;i--){var p=particles[i];p.x+=(p.vx||0);p.y+=(p.vy||0);p.vy=(p.vy||0)-0.02;p.l=(p.l||1)-0.015;if(p.l<=0)particles.splice(i,1)}
function drawP(){for(var i=0;i<particles.length;i++){var p=particles[i];cx.fillStyle="rgba(255,120,20,"+(p.l*0.8).toFixed(2)+")";cx.beginPath();cx.arc(p.x,p.y,Math.max(0.5,(p.sz||2),0,Math.PI*2);cx.fill()}}

function rr(x,y,w,h,r){r=Math.min(r,Math.min(w,h)/2);cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);cx.lineTo(x+r,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-r);cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);cx.closePath()}

    cx.textAlign="left";cx.textBaseline="top";
}

function drawFade(){if(fadeAlpha<=0)return;cx.fillStyle="rgba(5,8,18,"+fadeAlpha.toFixed(3)+")";cx.fillRect(0,0,960,540)}

function nextPhase(){
    phaseTick++;
    if(phaseTick>=60){phaseTick=0;if(phaseTick>0){phaseTick=0;gameState=phases[ph].scene;}
}

/* === LOOP === */
window.onload = function() {
    console.log("Iniciando Alexo v4...");if(phaseTick>0){phaseTick=0;return}
    requestAnimationFrame(loop);
};

function loop(){
    cx.clearRect(0,0,960,540);
    updP();
    dlgUpd();
    pt++;
    if(fadeAlpha>0){fadeAlpha-=0.015;if(fadeAlpha<0)fadeAlpha=0}
    if(gameState==="title"){nextPhase();return}
    if(gameState==="end"){drawDepart();drawEndCard();drawP();drawFade();requestAnimationFrame(loop);return}
    if(gameState==="salon"){drawSalon();
        if(ianVisible)drawIan(ianX,FY,walkPhase,showNotebook);
        if(axFace==="back")drawAlexo(alexX,FY,walkPhase);
    }else if(gameState==="window"){drawWindow();if(axFace==="back")drawAlexo(alexX,FY,walkPhase)}
    else if(gameState==="scan"){drawScan(0);if(axFace==="back")drawAlexo(alexX,FY,walkPhase)}
    else if(gameState==="depart"){drawDepart();if(axFace==="back")drawAlexo(alexX,FY,walkPhase)}
    else{cx.fillStyle="red";cx.font="bold 20px sans-serif";cx.textAlign="Fase desconocida: "+gameState;cx.fillText("Fase desconocida: "+gameState,20,20);}
    drawP();drawDlg();drawFade();
    requestAnimationFrame(loop);
};
</script></body></html>
