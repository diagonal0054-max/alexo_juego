<!DOCTYPE html><html><head><meta charset="utf-8"><title>Alexo v4</title>
<style>body{background:#000;margin:0;display:flex;justify-content:center;align-items:center;height:100vh}</style>
</head><body>
<canvas id="g" width="960" height="540"></canvas>
<script>
var cv=document.getElementById("g"),cx=cv.getContext("2d"),GW=960,GH=540;
var FY=360,gameState="title",ph=0,phaseTick=0,fadeAlpha=1,gameOver=false;
var walkPhase=0,alexoX=300,ianX=960,ianVisible=false,showNotebook=false,scanProgress=0;
var alexoFace="back",pt=0,ianWalking=false,ianTargetX=630;

/* dialogo */
var dlgTexts=[],dlgIdx=0,dlgChar=0,dlgTimer=0,dlgDone=false,dlgSpeaker="",dlgActive=false;
function startDialog(lines,speaker){dlgTexts=lines||[];dlgIdx=0;dlgChar=0;dlgDone=false;dlgSpeaker=speaker||"";dlgActive=true;dlgTimer=performance.now();}
function advanceDialog(){if(!dlgActive)return false;if(!dlgDone){dlgChar=dlgTexts[dlgIdx].length;dlgDone=true;return false;}dlgIdx++;dlgChar=0;dlgDone=false;dlgTimer=performance.now();if(dlgIdx>=dlgTexts.length){dlgActive=false;return true;}return false;}
function updateDialog(){if(!dlgActive||dlgDone)return;if(performance.now()-dlgTimer>=28){dlgChar++;dlgTimer=performance.now();if(dlgChar>=dlgTexts[dlgIdx].length)dlgDone=true;}}
function getDlgText(){if(!dlgActive||dlgTexts.length===0)return"";return dlgTexts[dlgIdx].substring(0,dlgChar);}

var phases=[
    {scene:"title",act:"show_title"},
    {scene:"salon",act:"stand",texts:["Arcadia. El barrio mas exclusivo de la ciudad."]},
    {scene:"salon",act:"stand",texts:["El salon de fiestas se prepara para la noche de gala. Alexo trabaja en silencio."]},
    {scene:"salon",act:"ian_enter",texts:["El mozo aparece con una bandeja. Se llama Ian. En sus ratos libres escribe cuentos."]},
    {scene:"salon",act:"ian_speak",texts:["Alexo... crees que lo que escribo tiene sentido?"],speaker:"Ian"},
    {scene:"salon",act:"show_notebook",texts:["Saca un cuaderno arrugado del bolsillo. Entre recetas, paginas llenas de letra a mano."]},
    {scene:"salon",act:"ian_speak",texts:["Es un cuento sobre un robot. No sabe si siente de verdad o solo calcula que siente."],speaker:"Ian"},
    {scene:"salon",act:"stand",texts:["Alexo procesa las palabras. No tiene una respuesta. No todavia."]},
    {scene:"salon",act:"ian_look",texts:["Ian guarda el cuaderno. Mira por la ventana. Algo lo inquieta."]},
    {scene:"salon",act:"ian_speak",texts:['Se escuchan sirenas. "El barrio esta convulsionado esta noche."'],speaker:"Ian"},
    {scene:"scan",act:"scan1",texts:["Alexo se acerca a la ventana. Sus sensores escanean mas alla de la rambla."]},
    {scene:"scan",act:"scan2",texts:["Ahi. Columna de humo negro. Torre residencial. Incendio activo."]},
    {scene:"scan",act:"scan3",texts:["Piso once. Una senal de vida. Un nino. Solo."]},
    {scene:"salon",act:"walk_exit",texts:["Alexo camina hacia la salida. No dice nada."]},
    {scene:"salon",act:"ian_call",texts:['"Eh Alexo, la gala empieza en una hora..."'],speaker:"Ian"},
    {scene:"depart",act:"walk_away",texts:["Alexo ya no esta. La puerta se cierra detras de el."]},
    {scene:"end",act:"game_over"}
];

function nextPhase(){
    phaseTick=0;ph++;
    if(ph>=phases.length)ph=phases.length-1;
    gameState=phases[ph].scene;
    var p=phases[ph];
    if(p.act==="game_over"){gameOver=true;return;}
    if(p.texts)startDialog(p.texts,p.speaker||"");
    if(p.act==="ian_enter"){ianVisible=true;ianX=960;ianWalking=true;ianTargetX=630;}
    if(p.act==="show_notebook")showNotebook=true;
    if(p.act==="ian_look")showNotebook=false;
    if(p.act==="scan1")scanProgress=0;
    if(p.act==="scan2")scanProgress=1;
    if(p.act==="scan3")scanProgress=2;
}

window.addEventListener("click",function(){
    if(gameOver){alert(">>> Siguiente escena: El salvataje <<<");return;}
    if(gameState==="title"){nextPhase();return;}
    if(dlgActive){var done=advanceDialog();if(done)nextPhase();return;}
    nextPhase();
});

function rr(x,y,w,h,r){r=Math.min(r,Math.min(w,h)/2);cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);cx.lineTo(x+r,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-r);cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);cx.closePath();}

/* ======== ALEXO ======== */
function drawAlexo(x,fy,idle){
    var now=performance.now();
    var breathY=Math.sin(now*0.0015)*1.5;
    var cleanAngle=0,leanX=0;
    if(idle){var t=now*0.002;cleanAngle=Math.sin(t)*0.38;leanX=Math.sin(t*0.5)*4;breathY+=Math.sin(t)*1;}
    cx.save();cx.translate(x+leanX,fy+breathY);
    cx.fillStyle="rgba(0,0,0,0.18)";cx.beginPath();cx.ellipse(0,3,20,6,0,0,Math.PI*2);cx.fill();
    /* piernas */
    cx.fillStyle="#6A6A80";cx.fillRect(-7,-22,6,22);cx.fillRect(1,-22,6,22);
    cx.fillStyle="#333340";cx.fillRect(-9,0,8,6);cx.fillRect(-1,0,8,6);
    /* torso */
    cx.fillStyle="#8A8AA8";cx.beginPath();cx.moveTo(-14,-135);cx.lineTo(14,-135);cx.lineTo(12,-22);cx.lineTo(-12,-22);cx.closePath();cx.fill();
    /* panel pecho */
    var gp=0.3+0.2*Math.sin(now*0.003);
    cx.shadowColor="#00FF88";cx.shadowBlur=14;
    cx.fillStyle="rgba(0,255,136,"+gp.toFixed(3)+")";cx.fillRect(-7,-120,14,16);cx.shadowBlur=0;
    /* brazos */
    cx.strokeStyle="#5A5A70";cx.lineWidth=5;cx.lineCap="round";
    /* izq quieto */
    cx.save();cx.translate(-15,-127);cx.rotate(0.08);cx.beginPath();cx.moveTo(0,0);cx.lineTo(0,22);cx.stroke();cx.fillStyle="#4A4A60";cx.fillRect(-4,20,8,8);cx.restore();
    /* der limpiando */
    cx.save();cx.translate(15,-127);cx.rotate(-0.08+cleanAngle);cx.beginPath();cx.moveTo(0,0);cx.lineTo(0,22);cx.stroke();cx.fillStyle="#4A4A60";cx.fillRect(-4,20,8,8);
    if(idle){cx.fillStyle="rgba(255,255,255,0.55)";cx.fillRect(-5,28,11,6);}
    cx.restore();
    /* cabeza */
    cx.fillStyle="#8A8AA8";rr(-12,-178,24,36,4);cx.fill();
    cx.fillStyle="#7A7A90";rr(-10,-174,20,18,3);cx.fill();
    cx.fillStyle="#7A7A90";cx.fillRect(-15,-172,4,7);cx.fillRect(11,-172,4,7);
    cx.strokeStyle="#7A7A90";cx.lineWidth=1.5;cx.beginPath();cx.moveTo(0,-178);cx.lineTo(0,-190);cx.stroke();
    cx.shadowColor="#00FF88";cx.shadowBlur=7;cx.fillStyle="#00FF88";cx.beginPath();cx.arc(0,-191,2.5,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
    cx.restore();
}

/* ======== IAN ======== */
function drawIan(x,fy,nbOpen){
    var now=performance.now();
    var breathY=Math.sin(now*0.0017)*1.2;
    cx.save();cx.translate(x,fy+breathY);
    /* sombra */
    cx.fillStyle="rgba(0,0,0,0.12)";cx.beginPath();cx.ellipse(0,3,14,5,0,0,Math.PI*2);cx.fill();
    /* piernas */
    cx.fillStyle="#2A2A3A";cx.fillRect(-6,-22,5,22);cx.fillRect(1,-22,5,22);
    cx.fillStyle="#1A1A22";cx.fillRect(-8,0,7,6);cx.fillRect(0,0,7,6);
    /* torso camisa blanca */
    cx.fillStyle="#EEEEE6";cx.beginPath();cx.moveTo(-11,-58);cx.lineTo(11,-58);cx.lineTo(10,-22);cx.lineTo(-10,-22);cx.closePath();cx.fill();
    /* chaleco negro */
    cx.fillStyle="#18181F";cx.beginPath();cx.moveTo(-9,-57);cx.lineTo(9,-57);cx.lineTo(8,-22);cx.lineTo(-8,-22);cx.closePath();cx.fill();
    /* moño */
    cx.fillStyle="#111118";
    cx.beginPath();cx.arc(-3.5,-60,3.5,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(3.5,-60,3.5,0,Math.PI*2);cx.fill();
    cx.fillRect(-3,-62,6,5);
    /* DELANTAL blanco sobre chaleco */
    cx.fillStyle="rgba(242,238,225,0.94)";
    cx.beginPath();cx.moveTo(-6,-50);cx.lineTo(6,-50);cx.lineTo(7,-22);cx.lineTo(-7,-22);cx.closePath();cx.fill();
    /* bolsillo delantal */
    cx.fillStyle="rgba(210,200,180,0.65)";rr(-5,-42,11,11,2);cx.fill();
    cx.strokeStyle="rgba(160,140,100,0.45)";cx.lineWidth=0.5;rr(-5,-42,11,11,2);cx.stroke();
    /* cuaderno asomando del bolsillo — siempre visible */
    cx.save();cx.translate(1,-43);cx.rotate(0.14);
    cx.fillStyle="#7A5C10";rr(-3,-7,9,9,1);cx.fill();
    cx.fillStyle="rgba(245,230,190,0.85)";rr(-2,-6,7,7,1);cx.fill();
    /* rayitas del cuaderno */
    cx.strokeStyle="rgba(120,90,40,0.5)";cx.lineWidth=0.6;
    for(var ln=0;ln<3;ln++){cx.beginPath();cx.moveTo(-1,-4+ln*2.2);cx.lineTo(4,-4+ln*2.2);cx.stroke();}
    cx.restore();
    /* brazo izquierdo — bandeja */
    cx.strokeStyle="#C8A882";cx.lineWidth=4;cx.lineCap="round";
    cx.save();cx.translate(-11,-46);cx.rotate(-0.28);
    cx.beginPath();cx.moveTo(0,0);cx.lineTo(0,24);cx.stroke();
    cx.fillStyle="#D4A574";cx.beginPath();cx.arc(0,25,3,0,Math.PI*2);cx.fill();
    /* bandeja */
    cx.fillStyle="rgba(215,195,155,0.92)";
    cx.beginPath();cx.ellipse(-1,-27,24,5,-0.28,0,Math.PI*2);cx.fill();
    cx.strokeStyle="rgba(170,150,110,0.55)";cx.lineWidth=0.5;cx.beginPath();cx.ellipse(-1,-27,24,5,-0.28,0,Math.PI*2);cx.stroke();
    /* copas en bandeja */
    for(var c=0;c<3;c++){var cpx=-14+c*13,cpy=-32;cx.fillStyle="rgba(210,235,255,0.4)";cx.beginPath();cx.moveTo(cpx-3,cpy);cx.lineTo(cpx+3,cpy);cx.lineTo(cpx+2,cpy-7);cx.lineTo(cpx-2,cpy-7);cx.closePath();cx.fill();cx.strokeStyle="rgba(200,230,255,0.6)";cx.lineWidth=0.5;cx.beginPath();cx.moveTo(cpx-3,cpy);cx.lineTo(cpx+3,cpy);cx.lineTo(cpx+2,cpy-7);cx.lineTo(cpx-2,cpy-7);cx.closePath();cx.stroke();}
    cx.restore();
    /* brazo derecho */
    cx.save();cx.translate(11,-46);cx.rotate(0.18);cx.beginPath();cx.moveTo(0,0);cx.lineTo(0,24);cx.stroke();cx.fillStyle="#D4A574";cx.beginPath();cx.arc(0,25,3,0,Math.PI*2);cx.fill();cx.restore();
    /* cuaderno abierto en mano si nbOpen */
    if(nbOpen){
        cx.save();cx.translate(20,-40);cx.rotate(0.2);
        cx.fillStyle="#7A5C10";rr(-1,-1,20,24,2);cx.fill();
        cx.fillStyle="rgba(248,238,205,0.94)";rr(0,0,18,22,1);cx.fill();
        cx.strokeStyle="rgba(90,60,30,0.28)";cx.lineWidth=0.5;
        for(var l2=0;l2<6;l2++){cx.beginPath();cx.moveTo(2,3+l2*3.2);cx.lineTo(16,3+l2*3.2);cx.stroke();}
        cx.fillStyle="rgba(60,40,20,0.5)";cx.font="italic 3.5px sans-serif";cx.textAlign="left";
        cx.fillText("...el robot",2,5);cx.fillText("no sabe si",2,9);cx.fillText("siente...",2,13);
        cx.restore();
    }
    /* cabeza */
    cx.fillStyle="#D4A574";cx.beginPath();cx.arc(0,-68,9,0,Math.PI*2);cx.fill();
    cx.fillStyle="#3A2A1A";cx.beginPath();cx.arc(0,-70,9,Math.PI+0.2,-0.2);cx.fill();
    cx.fillStyle="#2A180A";cx.beginPath();cx.arc(-3,-68,1.5,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(3,-68,1.5,0,Math.PI*2);cx.fill();
    cx.restore();
}

/* ======== SALON ======== */
function drawSalon(){
    var now=performance.now();
    /* fondo paredes */
    var bg=cx.createLinearGradient(0,0,0,GH);
    bg.addColorStop(0,"#1C1008");bg.addColorStop(0.65,"#2A1A0E");bg.addColorStop(1,"#100A04");
    cx.fillStyle=bg;cx.fillRect(0,0,GW,GH);
    cx.fillStyle="#221408";cx.fillRect(0,0,GW,345);
    /* paneles verticales pared */
    cx.strokeStyle="rgba(70,42,16,0.38)";cx.lineWidth=1.5;
    for(var pv=0;pv<GW;pv+=80){cx.beginPath();cx.moveTo(pv,0);cx.lineTo(pv,345);cx.stroke();}
    cx.strokeStyle="rgba(70,42,16,0.25)";cx.lineWidth=1;
    cx.beginPath();cx.moveTo(0,200);cx.lineTo(GW,200);cx.stroke();
    cx.beginPath();cx.moveTo(0,80);cx.lineTo(GW,80);cx.stroke();
    /* moldura */
    cx.fillStyle="#3A2510";cx.fillRect(0,0,GW,6);
    cx.fillStyle="#4A3018";cx.fillRect(0,6,GW,2);

    /* VENTANAS x4 */
    var wins=[80,265,520,710];
    for(var wi=0;wi<wins.length;wi++){
        var wx=wins[wi],wy=28,ww=120,wh=190;
        var wg2=cx.createLinearGradient(wx,wy,wx,wy+wh);
        wg2.addColorStop(0,"#060A18");wg2.addColorStop(1,"#0E1830");
        cx.fillStyle=wg2;cx.fillRect(wx,wy,ww,wh);
        for(var st=0;st<10;st++){
            var sa=0.15+0.5*(0.5+0.5*Math.sin(now*0.001+wi*5+st*4));
            cx.fillStyle="rgba(255,255,240,"+sa.toFixed(2)+")";
            cx.beginPath();cx.arc(wx+8+st*12,wy+6+st*7%25,0.9,0,Math.PI*2);cx.fill();
        }
        /* skyline */
        cx.fillStyle="#070B16";
        var bh3=[22,32,18,38,25,16,30,20];
        for(var bk=0;bk<8;bk++)cx.fillRect(wx+bk*15,wy+wh-bh3[bk],13,bh3[bk]);
        /* luz parpadeante edificio */
        var lf=0.08+0.2*(0.5+0.5*Math.sin(now*0.0009+wi*3));
        cx.fillStyle="rgba(255,200,80,"+lf.toFixed(2)+")";cx.fillRect(wx+28,wy+wh-20,3,4);cx.fillRect(wx+68,wy+wh-34,3,4);
        /* marco */
        cx.strokeStyle="#6B4A22";cx.lineWidth=4;cx.strokeRect(wx,wy,ww,wh);
        cx.strokeStyle="#5A3A18";cx.lineWidth=1.5;
        cx.beginPath();cx.moveTo(wx+ww/2,wy);cx.lineTo(wx+ww/2,wy+wh);cx.stroke();
        cx.beginPath();cx.moveTo(wx,wy+wh/2);cx.lineTo(wx+ww,wy+wh/2);cx.stroke();
    }

    /* LAMPARAS x3 */
    var lamps=[210,480,750];
    for(var li=0;li<lamps.length;li++){
        var lx=lamps[li];
        var sw=Math.sin(now*0.0006+li*1.4)*4;
        cx.save();cx.translate(lx+sw,0);
        cx.strokeStyle="#5A3A18";cx.lineWidth=1.5;cx.beginPath();cx.moveTo(0,0);cx.lineTo(0,48);cx.stroke();
        cx.fillStyle="#8B7040";rr(-16,48,32,10,4);cx.fill();
        for(var ar=0;ar<5;ar++){
            var ax=(ar-2)*11;
            cx.strokeStyle="#7A6030";cx.lineWidth=1;cx.beginPath();cx.moveTo(ax,48);cx.lineTo(ax,60);cx.stroke();
            var gl=0.45+0.4*Math.sin(now*0.002+li+ar);
            cx.shadowColor="#FFD070";cx.shadowBlur=10*gl;
            cx.fillStyle="rgba(255,215,80,"+gl.toFixed(2)+")";cx.beginPath();cx.arc(ax,64,3,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
        }
        /* halo en suelo bajo lampara */
        var hg=cx.createRadialGradient(0,345,0,0,345,180);
        hg.addColorStop(0,"rgba(255,215,80,0.07)");hg.addColorStop(1,"rgba(255,215,80,0)");
        cx.fillStyle=hg;cx.beginPath();cx.ellipse(0,342,150,45,0,0,Math.PI*2);cx.fill();
        cx.restore();
    }

    /* SUELO parquet */
    var flg=cx.createLinearGradient(0,345,0,GH);
    flg.addColorStop(0,"#201308");flg.addColorStop(0.5,"#180F06");flg.addColorStop(1,"#0D0904");
    cx.fillStyle=flg;cx.fillRect(0,345,GW,GH-345);
    cx.strokeStyle="rgba(55,30,8,0.32)";cx.lineWidth=1;
    for(var tx=0;tx<GW;tx+=42){cx.beginPath();cx.moveTo(tx,345);cx.lineTo(tx,GH);cx.stroke();}
    for(var ty=345;ty<GH;ty+=26){cx.beginPath();cx.moveTo(0,ty);cx.lineTo(GW,ty);cx.stroke();}
    var sfl=cx.createLinearGradient(0,345,0,410);
    sfl.addColorStop(0,"rgba(255,210,140,0.05)");sfl.addColorStop(1,"rgba(255,210,140,0)");
    cx.fillStyle=sfl;cx.fillRect(0,345,GW,65);

    /* MESAS x4 */
    var mesas=[{x:165,y:318},{x:370,y:326},{x:580,y:318},{x:800,y:326}];
    for(var mi=0;mi<mesas.length;mi++){
        var mx=mesas[mi].x,my=mesas[mi].y;
        cx.fillStyle="rgba(252,250,242,0.94)";cx.beginPath();cx.ellipse(mx,my,52,19,0,0,Math.PI*2);cx.fill();
        cx.strokeStyle="rgba(195,185,165,0.45)";cx.lineWidth=0.5;cx.beginPath();cx.ellipse(mx,my,52,19,0,0,Math.PI*2);cx.stroke();
        /* platos */
        var pp=[-30,-10,10,30];
        for(var pi2=0;pi2<pp.length;pi2++){
            cx.fillStyle="rgba(255,255,255,0.92)";cx.beginPath();cx.ellipse(mx+pp[pi2],my,7,3,0,0,Math.PI*2);cx.fill();
            cx.strokeStyle="rgba(180,170,155,0.55)";cx.lineWidth=0.4;cx.beginPath();cx.ellipse(mx+pp[pi2],my,7,3,0,0,Math.PI*2);cx.stroke();
        }
        /* copas */
        for(var ci=0;ci<3;ci++){
            var cpx=mx-18+ci*18,cpy=my-9;
            cx.fillStyle="rgba(200,230,255,0.32)";cx.beginPath();cx.moveTo(cpx-3,cpy);cx.lineTo(cpx+3,cpy);cx.lineTo(cpx+2,cpy-8);cx.lineTo(cpx-2,cpy-8);cx.closePath();cx.fill();
            cx.strokeStyle="rgba(200,230,255,0.55)";cx.lineWidth=0.5;cx.beginPath();cx.moveTo(cpx-3,cpy);cx.lineTo(cpx+3,cpy);cx.lineTo(cpx+2,cpy-8);cx.lineTo(cpx-2,cpy-8);cx.closePath();cx.stroke();
        }
        /* vela central */
        var cf=0.65+0.35*Math.sin(now*0.007+mx);
        cx.fillStyle="#F5F0E0";cx.fillRect(mx-2,my-15,4,11);
        cx.shadowColor="#FFD070";cx.shadowBlur=8*cf;
        cx.fillStyle="rgba(255,175,0,"+cf.toFixed(2)+")";cx.beginPath();cx.arc(mx,my-17,2,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
        /* pata */
        cx.fillStyle="#4A3018";cx.fillRect(mx-2,my+19,4,24);cx.fillRect(mx-12,my+41,24,4);
    }

    /* BARRA lateral derecha */
    cx.fillStyle="#3A2510";cx.fillRect(840,225,120,120);
    cx.fillStyle="#4A3018";cx.fillRect(838,222,124,12);
    var bottles=["#6A2030","#1A4A2A","#4A3A10","#2A2A4A","#5A2510"];
    for(var bt=0;bt<5;bt++){
        var bx2=850+bt*20,by2=225;
        cx.fillStyle=bottles[bt];cx.fillRect(bx2,by2-38,8,38);cx.beginPath();cx.arc(bx2+4,by2-39,4,0,Math.PI*2);cx.fill();
        cx.fillStyle="rgba(255,255,255,0.13)";cx.fillRect(bx2+1,by2-24,6,12);
    }
    cx.fillStyle="rgba(200,220,240,0.07)";cx.fillRect(842,155,116,68);
    cx.strokeStyle="rgba(180,150,80,0.35)";cx.lineWidth=1.5;cx.strokeRect(842,155,116,68);

    /* CORTINAS laterales */
    for(var side=0;side<2;side++){
        var sx=side===0?0:GW,dir=side===0?1:-1;
        var cg=cx.createLinearGradient(sx,0,sx+dir*55,0);
        cg.addColorStop(0,"rgba(95,18,18,0.88)");cg.addColorStop(1,"rgba(95,18,18,0)");
        cx.fillStyle=cg;cx.fillRect(sx,0,dir*55,GH);
        cx.strokeStyle="rgba(60,8,8,0.4)";cx.lineWidth=1.5;
        for(var fl=1;fl<5;fl++){cx.beginPath();cx.moveTo(sx+dir*fl*10,0);cx.bezierCurveTo(sx+dir*(fl*10+6),GH/3,sx+dir*(fl*10-4),GH*0.6,sx+dir*fl*10,GH);cx.stroke();}
    }

    /* zócalo */
    cx.fillStyle="#2A1808";cx.fillRect(0,340,GW,7);
    cx.fillStyle="#3A2510";cx.fillRect(0,338,GW,3);
}

/* ======== TITLE ======== */
function drawTitle(){
    cx.fillStyle="#050812";cx.fillRect(0,0,GW,GH);
    var now=performance.now();
    for(var i=0;i<40;i++){var px=(i*137+now*0.008)%GW,py=(i*97+now*0.006)%GH;cx.fillStyle="rgba(0,255,136,0.05)";cx.beginPath();cx.arc(px,py,1.5,0,Math.PI*2);cx.fill();}
    var tg=0.6+0.4*Math.sin(now*0.002);
    cx.shadowColor="#00FF88";cx.shadowBlur=30*tg;cx.fillStyle="#00FF88";
    cx.font="bold 72px Orbitron,sans-serif";cx.textAlign="center";cx.textBaseline="middle";
    cx.fillText("ALEXO",GW/2,GH/2-20);cx.shadowBlur=0;
    cx.fillStyle="rgba(200,200,220,0.5)";cx.font="300 16px sans-serif";cx.fillText("Una aventura de consciencia",GW/2,GH/2+20);
    var bk=0.3+0.7*Math.abs(Math.sin(now*0.003));
    cx.fillStyle="rgba(200,200,220,"+bk.toFixed(2)+")";cx.font="400 14px sans-serif";cx.fillText("[ clic para avanzar ]",GW/2,GH/2+60);
    cx.textAlign="left";cx.textBaseline="top";
}

/* ======== WINDOW / SCAN / DEPART ======== */
function drawWindow(){
    cx.fillStyle="#05080F";cx.fillRect(0,0,GW,GH);
    var now=performance.now();
    var stars=[50,150,300,450,550,700,850];
    for(var i=0;i<stars.length;i++){var a=0.15+0.4*(0.5+0.5*Math.sin(now*0.001+stars[i]));cx.fillStyle="rgba(255,255,240,"+a.toFixed(2)+")";cx.beginPath();cx.arc(stars[i],25+i*4,1,0,Math.PI*2);cx.fill();}
    var sg=cx.createLinearGradient(0,0,0,260);sg.addColorStop(0,"#0B0C1E");sg.addColorStop(0.5,"#4A2040");sg.addColorStop(1,"#C84B31");cx.fillStyle=sg;cx.fillRect(0,200,GW,60);
    var sng=cx.createRadialGradient(GW*0.7,255,5,GW*0.7,255,60);sng.addColorStop(0,"rgba(255,200,50,0.4)");sng.addColorStop(1,"rgba(255,100,50,0)");cx.fillStyle=sng;cx.beginPath();cx.arc(GW*0.7,255,60,0,Math.PI*2);cx.fill();
    var blds=[0,75,135,225,280,350,435,485,560,620,705,770,865],bwd=[70,55,85,50,65,80,45,70,55,80,60,90,95],bhd=[110,150,120,170,130,155,140,180,125,155,135,165,115];
    for(var j=0;j<blds.length;j++){cx.fillStyle="#0C0E18";cx.fillRect(blds[j],260-bhd[j],bwd[j],bhd[j]);for(var r=0;r<Math.floor(bhd[j]/18);r++)for(var c=0;c<Math.floor(bwd[j]/12);c++){if(Math.random()>0.45){cx.fillStyle="rgba(255,200,80,0.18)";cx.fillRect(blds[j]+3+c*12,260-bhd[j]+5+r*18,4,7);}}}
    cx.strokeStyle="#8B7355";cx.lineWidth=10;cx.strokeRect(0,0,GW,GH);
    cx.strokeStyle="#6B5535";cx.lineWidth=4;cx.beginPath();cx.moveTo(GW/2,0);cx.lineTo(GW/2,GH);cx.stroke();cx.beginPath();cx.moveTo(0,GH/2);cx.lineTo(GW,GH/2);cx.stroke();
}
function drawScan(prog){
    drawWindow();var now=performance.now();
    cx.fillStyle="rgba(0,255,136,0.04)";cx.fillRect(0,0,GW,GH);
    var scanY=(now*0.15)%GH;cx.strokeStyle="rgba(0,255,136,0.25)";cx.lineWidth=1;cx.beginPath();cx.moveTo(0,scanY);cx.lineTo(GW,scanY);cx.stroke();
    cx.fillStyle="rgba(0,255,136,0.06)";cx.fillRect(0,scanY-2,GW,4);
    cx.strokeStyle="rgba(0,255,136,0.03)";cx.lineWidth=0.5;for(var i=0;i<GW;i+=55){cx.beginPath();cx.moveTo(i,0);cx.lineTo(i,GH);cx.stroke();}
    cx.fillStyle="rgba(0,255,136,0.7)";cx.font="11px Orbitron,sans-serif";cx.textAlign="left";cx.fillText("ESCANEANDO ARCADIA...",30,30);cx.fillText("RADIO: 2.4 KM",30,48);
    if(prog>=1){cx.fillStyle="rgba(255,80,0,0.8)";cx.fillText("ALERTA: INCENDIO DETECTADO",30,68);cx.fillStyle="rgba(255,80,0,0.4)";cx.font="10px sans-serif";cx.fillText("Torre Residencial - Sector 12",30,84);}
    if(prog>=2){cx.fillStyle="rgba(255,50,50,0.8)";cx.font="11px Orbitron,sans-serif";cx.fillText("SE\u00d1AL DE VIDA",30,105);cx.fillStyle="rgba(255,50,50,0.5)";cx.font="10px sans-serif";cx.fillText("Piso 11 - Patron: infantil - Unico",30,121);cx.strokeStyle="rgba(255,50,50,0.5)";cx.lineWidth=1.5;cx.setLineDash([4,4]);cx.beginPath();cx.moveTo(180,130);cx.lineTo(GW*0.7-10,245);cx.stroke();cx.setLineDash([]);var pulse=0.5+0.5*Math.sin(now*0.006);cx.fillStyle="rgba(255,50,50,"+pulse.toFixed(2)+")";cx.beginPath();cx.arc(GW*0.7,245,5+pulse*4,0,Math.PI*2);cx.fill();}
    cx.textAlign="left";
}
function drawDepart(){
    cx.fillStyle="#05080F";cx.fillRect(0,0,GW,GH);
    var blds2=[{x:0,w:80,h:100},{x:600,w:60,h:120},{x:665,w:85,h:95},{x:755,w:55,h:135},{x:815,w:65,h:105},{x:885,w:75,h:90}];
    for(var i=0;i<blds2.length;i++){cx.fillStyle="#0A0C14";cx.fillRect(blds2[i].x,440-blds2[i].h,blds2[i].w,blds2[i].h);}
    cx.fillStyle="#14161E";cx.fillRect(0,440,GW,100);cx.fillStyle="#1A1C26";cx.fillRect(0,435,GW,8);
    var th=180,ty=440-th;cx.fillStyle="#1A1C28";cx.fillRect(750,ty,80,th);
    for(var j=0;j<4;j++){cx.fillStyle="rgba(255,"+(60+j*20)+",0,0.25)";cx.fillRect(758,ty+j*15,64,8);}
    var now=performance.now();if(Math.random()<0.2){for(var k=0;k<2;k++)particles.push({x:790+(Math.random()-.5)*30,y:ty,vx:(Math.random()-.5),vy:-(Math.random()*2+1),l:1,sz:2+Math.random()*4});}
}

var particles=[];
function updP(){for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx||0;p.y+=p.vy||0;p.vy=(p.vy||0)-0.02;p.l=(p.l||1)-0.015;if(p.l<=0)particles.splice(i,1);}}
function drawP(){for(var i=0;i<particles.length;i++){var p=particles[i];cx.fillStyle="rgba(255,120,20,"+(p.l*0.8).toFixed(2)+")";cx.beginPath();cx.arc(p.x,p.y,Math.max(0.5,p.sz||2),0,Math.PI*2);cx.fill();}}

/* ======== DIALOGO ======== */
function drawDlg(){
    if(!dlgActive)return;
    var bx=20,by=GH-125,bw=GW-40,bh=105;
    cx.fillStyle="rgba(5,8,18,0.88)";rr(bx,by,bw,bh,8);cx.fill();
    cx.strokeStyle="rgba(0,255,136,0.25)";cx.lineWidth=1;rr(bx,by,bw,bh,8);cx.stroke();
    cx.fillStyle="#00FF88";cx.globalAlpha=0.4;cx.fillRect(bx+15,by+1,40,2);cx.globalAlpha=1;
    var txX=bx+20;
    if(dlgSpeaker!==""){cx.fillStyle="rgba(0,255,136,0.6)";cx.font="600 13px sans-serif";cx.textBaseline="top";cx.textAlign="left";cx.fillText(dlgSpeaker+":",txX,by+12);txX+=cx.measureText(dlgSpeaker+": ").width;}
    cx.fillStyle="#E0E0E0";cx.font="18px sans-serif";cx.textBaseline="top";cx.textAlign="left";
    var txt=getDlgText();if(txt.length>0)cx.fillText(txt,txX,by+12,bw-(txX-bx)-20);
    if(dlgDone){var ba=0.3+0.7*Math.abs(Math.sin(performance.now()*0.003));cx.fillStyle="rgba(0,255,136,"+ba.toFixed(2)+")";cx.font="14px sans-serif";cx.textAlign="right";cx.fillText("\u25bc continuar",bx+bw-20,by+bh-18);cx.textAlign="left";}
    cx.textAlign="left";cx.textBaseline="top";
}
function drawEndCard(){
    var bx=GW/2-200,by=GH/2-50,bw=400,bh=100;
    cx.fillStyle="rgba(5,8,18,0.9)";rr(bx,by,bw,bh,10);cx.fill();cx.strokeStyle="rgba(0,255,136,0.25)";cx.lineWidth=1;rr(bx,by,bw,bh,10);cx.stroke();
    cx.fillStyle="#00FF88";cx.font="600 17px sans-serif";cx.textAlign="center";cx.textBaseline="middle";cx.fillText("Alexo ya no esta.",GW/2,GH/2-15);
    cx.fillStyle="#888";cx.font="300 12px sans-serif";cx.fillText("La puerta se cierra detras de el.",GW/2,GH/2+5);
    var bk=0.3+0.7*Math.abs(Math.sin(performance.now()*0.03));
    cx.fillStyle="rgba(0,255,136,"+bk.toFixed(2)+")";cx.font="300 14px sans-serif";cx.fillText(">>> Siguiente escena: El salvataje <<<",GW/2,GH/2+28);
    cx.fillStyle="rgba(200,200,220,0.2)";cx.font="300 11px sans-serif";cx.fillText("clic para ir al menu",GW/2,GH/2+48);
    cx.textAlign="left";cx.textBaseline="top";
}
function drawFade(){if(fadeAlpha<=0)return;cx.fillStyle="rgba(5,8,18,"+fadeAlpha.toFixed(3)+")";cx.fillRect(0,0,GW,GH);}

/* ======== LOOP ======== */
function loop(){
    cx.clearRect(0,0,GW,GH);
    updP();updateDialog();pt++;
    if(fadeAlpha>0){fadeAlpha-=0.012;if(fadeAlpha<0)fadeAlpha=0;}
    /* Ian caminando */
    if(ianWalking&&ianX>ianTargetX){ianX-=1.6;walkPhase=Math.floor((performance.now()/140)%3);if(ianX<=ianTargetX){ianX=ianTargetX;ianWalking=false;walkPhase=0;}}

    if(gameState==="title"){drawTitle();drawFade();requestAnimationFrame(loop);return;}
    if(gameState==="end"){drawDepart();drawEndCard();drawP();drawFade();requestAnimationFrame(loop);return;}

    if(gameState==="salon"){
        drawSalon();
        if(ianVisible)drawIan(ianX,FY,showNotebook);
        /* Alexo idle de limpiar solo en las primeras dos fases del salon */
        drawAlexo(alexoX,FY,ph<=2);
    }else if(gameState==="window"){
        drawWindow();drawAlexo(alexoX,FY,false);
    }else if(gameState==="scan"){
        drawScan(scanProgress);drawAlexo(alexoX,FY,false);
    }else if(gameState==="depart"){
        drawDepart();drawAlexo(alexoX,FY,false);
    }else{
        cx.fillStyle="#222";cx.fillRect(0,0,GW,GH);
        cx.fillStyle="red";cx.font="bold 20px sans-serif";cx.textAlign="left";cx.textBaseline="top";
        cx.fillText("Fase desconocida: "+gameState,20,20);
    }
    drawP();drawDlg();drawFade();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>
